          </div>

          <div style={{ marginBottom:8 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
              <label style={{ fontSize:13, fontWeight:600 }}>แนบหลักฐานการชำระเงิน</label>
              <span style={{ fontSize:12, color:'var(--ink-3)' }}>ไม่บังคับ — แนบเมื่อจำเป็น</span>

              <button onClick={()=>setProof(true)} style={{

                <Icons.upload size={20} style={{ color:'var(--primary)', marginBottom:6 }}/>
                <div style={{ fontWeight:600, fontSize:13 }}>คลิกเพื่อแนบ slip หรือลากไฟล์มาวาง</div>
                <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:2 }}>JPG, PNG, PDF — สูงสุด 10 MB</div>
              </button>
            ) : (
              <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', background:'var(--mint-50)', borderRadius:12 }}>
                <div style={{ width:48, height:48, borderRadius:8, background:'white', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'IBM Plex Mono', fontSize:10, color:'var(--ink-3)' }}>SLIP</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600 }}>slip-{ref.toLowerCase()}.jpg</div>
                  <div style={{ fontSize:12, color:'var(--ink-3)' }}>284 KB · แนบเรียบร้อย</div>
                </div>
                <button onClick={()=>setProof(false)} style={{ background:'transparent', border:'none', cursor:'pointer', color:'var(--ink-3)', fontSize:14 }}>✕</button>
              </div>
            )}
          </div>
        </div>

        <div style={{ padding:'16px 28px', borderTop:'1px solid var(--line)', display:'flex', gap:10, background:'var(--surface-2)', borderRadius:'0 0 20px 20px' }}>
          <button className="btn btn-soft" onClick={onClose} style={{ flex:1, justifyContent:'center' }}>ยกเลิก</button>
          <button className="btn" onClick={()=>onPaid(isBatch
              ? `บันทึกการจ่ายเงิน ${items.length} รายการ รวม ${fmtTHB(total)} เรียบร้อย ✓`
              : `บันทึกการจ่ายเงิน ${items[0].id} เรียบร้อย ✓`)}
            style={{ flex:2, justifyContent:'center', background:'var(--sky)', color:'white' }}>
            <Icons.check size={16}/> ยืนยันการจ่ายเงิน
          </button>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { DashFinance, Payment });

const CategoriesTab = () => {
  const [groups, setGroups] = React.useState(EXPENSE_GROUPS);
  const [editing, setEditing] = React.useState(null);
  const [toast, setToast] = React.useState('');

  // Stats
  const totalItems = groups.reduce((s,g) => s + g.sections.reduce((ss,sec) => ss + sec.items.length, 0), 0);
  const usedCounts = {};
  CLAIMS.forEach(c => { usedCounts[c.category] = (usedCounts[c.category]||0) + 1; });

  const updateItem = (groupCode, sectionCode, itemCode, newLabel) => {
    setGroups(prev => prev.map(g => g.code !== groupCode ? g : ({
      ...g, sections: g.sections.map(s => s.code !== sectionCode ? s : ({
        ...s, items: s.items.map(it => it.code !== itemCode ? it : ({ ...it, label: newLabel }))
      }))
    })));
    setToast('บันทึกการแก้ไขเรียบร้อย ✓'); setTimeout(()=>setToast(''), 1500);
  };

  const deleteItem = (groupCode, sectionCode, itemCode) => {
    if (!confirm('ลบหมวด ' + itemCode + ' ใช่หรือไม่?')) return;
    setGroups(prev => prev.map(g => g.code !== groupCode ? g : ({
      ...g, sections: g.sections.map(s => s.code !== sectionCode ? s : ({
        ...s, items: s.items.filter(it => it.code !== itemCode)
      }))
    })));
    setToast('ลบหมวดเรียบร้อย'); setTimeout(()=>setToast(''), 1500);
  };

  const addItem = (groupCode, sectionCode) => {
    setGroups(prev => prev.map(g => g.code !== groupCode ? g : ({
      ...g, sections: g.sections.map(s => {
        if (s.code !== sectionCode) return s;
        const nextNum = s.items.length === 0 ? 1 : Math.max(...s.items.map(i => parseInt(i.code.split('.')[1] || '0'))) + 1;
        const newCode = `${s.code}.${nextNum}`;
        return { ...s, items: [...s.items, { code: newCode, label: 'หมวดใหม่', isNew:true }] };
      })
    })));
    setToast('เพิ่มหมวดใหม่ — กดแก้ไขเพื่อตั้งชื่อ'); setTimeout(()=>setToast(''), 1800);
  };

  return (
    <>
      {/* Groups */}
      <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
        {groups.map(g => {
          const groupItemCount = g.sections.reduce((s,sec) => s + sec.items.length, 0);
          const groupUsage = g.sections.reduce((s,sec) => s + sec.items.reduce((ss,it) => ss + (usedCounts[it.code]||0), 0), 0);
          return (
            <div key={g.code} className="card" style={{ padding:0, overflow:'hidden' }}>
              {/* Group header */}
              <div style={{
                padding:'18px 24px', display:'flex', alignItems:'center', gap:14,
                background:`linear-gradient(135deg, ${g.color}, ${g.color}CC)`, color:'white'
              }}>
                <div style={{
                  width:44, height:44, borderRadius:12, background:'rgba(255,255,255,.2)', backdropFilter:'blur(4px)',
                  display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif',
                  fontSize:20, fontWeight:700
                }}>{g.code}</div>
                <div style={{ flex:1 }}>
                  <div className="display" style={{ fontSize:18, fontWeight:700 }}>{g.label}</div>
                  <div style={{ fontSize:12, opacity:.85 }}>
                    {g.sections.length} หมวดใหญ่ · {groupItemCount} หมวดย่อย · ใช้ใน {groupUsage} ใบเบิก
                  </div>
                </div>
                <button className="btn btn-soft" style={{ background:'rgba(255,255,255,.18)', borderColor:'transparent', color:'white' }}>
                  <Icons.cog size={14}/> แก้ไขกลุ่ม
                </button>
              </div>

              {/* Sections */}
              <div style={{ padding:'8px 0' }}>
                {g.sections.map(s => (
                  <div key={s.code} style={{ padding:'14px 24px', borderTop:'1px solid var(--line)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                      <div style={{
                        width:32, height:32, borderRadius:9, background:s.color, color:'white',
                        display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif',
                        fontWeight:700, fontSize:13
                      }}>{s.code}</div>
                      <div style={{ flex:1 }}>
                        <div className="display" style={{ fontSize:15, fontWeight:700 }}>{s.label}</div>
                        <div style={{ fontSize:11, color:'var(--ink-3)' }}>{s.items.length} หมวดย่อย</div>
                      </div>
                      <button onClick={()=>addItem(g.code, s.code)} className="btn btn-soft" style={{ height:32, padding:'0 12px' }}>
                        <Icons.plus size={14}/> เพิ่มหมวดย่อย
                      </button>
                    </div>

                    {/* Items table */}
                    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                      {s.items.map(it => {
                        const usage = usedCounts[it.code] || 0;
                        const isEditing = editing && editing.code === it.code;
                        return (
                          <ItemRow key={it.code} item={it} section={s} usage={usage}
                            isEditing={isEditing}
                            onEdit={()=>setEditing(it)}
                            onSave={(newLabel)=>{ updateItem(g.code, s.code, it.code, newLabel); setEditing(null); }}
                            onCancel={()=>setEditing(null)}
                            onDelete={()=>deleteItem(g.code, s.code, it.code)}
                          />
                        );
                      })}
                      {s.items.length === 0 && (
                        <div style={{ padding:'18px', textAlign:'center', color:'var(--ink-3)', background:'var(--surface-2)', borderRadius:10, fontSize:13 }}>
                          ยังไม่มีหมวดย่อย — กด "เพิ่มหมวดย่อย" เพื่อสร้าง
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {toast && <Toast text={toast}/>}
    </>
  );
};

const ItemRow = ({ item, section, usage, isEditing, onEdit, onSave, onCancel, onDelete }) => {
  const [val, setVal] = React.useState(item.label);
  React.useEffect(() => { setVal(item.label); }, [item.label, isEditing]);

  if (isEditing) {
    return (
      <div style={{
        display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:10,
        border:`2px solid ${section.color}`, background:section.color+'10'
      }}>
        <span className="mono" style={{
          padding:'4px 8px', borderRadius:6, background:section.color, color:'white',
          fontWeight:700, fontSize:12, fontFamily:'Sora, sans-serif'
        }}>{item.code}</span>
        <input className="input" value={val} onChange={e=>setVal(e.target.value)} autoFocus
               style={{ flex:1, height:36, fontSize:14, fontWeight:500 }}/>
        <button className="btn btn-soft" onClick={onCancel} style={{ height:36 }}>ยกเลิก</button>
        <button className="btn btn-accent" onClick={()=>onSave(val)} style={{ height:36 }}>
          <Icons.check size={14}/> บันทึก
        </button>
      </div>
    );
  }

  return (
    <div style={{
      display:'flex', alignItems:'center', gap:12, padding:'10px 14px', borderRadius:10,
      background: item.isNew ? 'var(--sun-50)' : 'var(--surface-2)',
      border: item.isNew ? '1px solid #FFCB47' : '1px solid transparent'
    }}>
      <span className="mono" style={{
        padding:'4px 8px', borderRadius:6, background:section.color+'22', color:section.color,
        fontWeight:700, fontSize:12, fontFamily:'Sora, sans-serif', minWidth:48, textAlign:'center'
      }}>{item.code}</span>
      <div style={{ flex:1, fontSize:14, fontWeight:500 }}>
        {item.label}
        {item.isNew && <span className="badge" style={{ marginLeft:8, background:'#FFCB47', color:'#3A1F0A' }}>ใหม่</span>}
      </div>
      <span style={{ fontSize:12, color:'var(--ink-3)' }}>
        ใช้แล้ว {usage} ใบ
      </span>
      <div style={{ display:'flex', gap:4 }}>
        <button onClick={onEdit} className="btn btn-soft" style={{ height:30, padding:'0 10px', fontSize:12 }}>
          แก้ไข
        </button>
        <button onClick={onDelete} className="btn btn-soft" style={{ height:30, padding:'0 10px', fontSize:12, color:'var(--bad)' }}
                disabled={usage > 0} title={usage > 0 ? 'มีการใช้งานอยู่ ลบไม่ได้' : 'ลบหมวดนี้'}>
          ลบ
        </button>
      </div>
    </div>
  );
};

// ============ PROJECTS TAB ============

const ProjectsTab = () => {
  const [projects, setProjects] = React.useState(PROJECTS);
  const [adding, setAdding] = React.useState(false);
  const [newCode, setNewCode] = React.useState('');
  const [newLabel, setNewLabel] = React.useState('');
  const [newStart, setNewStart] = React.useState('2569-05');
  const [editingCode, setEditingCode] = React.useState(null);
  const [editLabel, setEditLabel] = React.useState('');
  const [search, setSearch] = React.useState('');
  const [toast, setToast] = React.useState('');

  // Usage count
  const usage = {};
  CLAIMS.forEach(c => {
    // expense form stores project code in claim — we'd map this in real system.
    // Demo: distribute claims across projects roughly
  });
  // Simple sample usage counts
  const sampleUsage = { ADN:18, APB:12, BFU:7, BIW:24, DOB:9, GDD:14, GHB:5, GNV:3, JDX:21, JYX:11, LUC:8, MMA:16, STR:6, PBA:4, TGO:13, VCE:0, VKK:2, ZTR:0, ALL:42 };
  const totalUsed = Object.values(sampleUsage).reduce((s,n)=>s+n, 0);

  let rows = projects;
  if (search) rows = rows.filter(p => (p.code + ' ' + p.label).toLowerCase().includes(search.toLowerCase()));

  const addProject = () => {
    if (!newCode.trim()) { setToast('กรุณากรอกรหัสโครงการ'); setTimeout(()=>setToast(''),1500); return; }
    const code = newCode.trim().toUpperCase();
    if (projects.some(p => p.code === code)) { setToast('รหัส ' + code + ' มีอยู่แล้ว'); setTimeout(()=>setToast(''),1500); return; }
    setProjects([...projects, { code, label: newLabel.trim() || code, start: newStart, active:true, isNew:true }]);
    setNewCode(''); setNewLabel(''); setAdding(false);
    setToast('เพิ่มโครงการ ' + code + ' เรียบร้อย ✓'); setTimeout(()=>setToast(''),1600);
  };

  const removeProject = (code) => {
    const used = sampleUsage[code] || 0;
    if (used > 0) {
      setToast('โครงการ ' + code + ' มีใบเบิก ' + used + ' ใบ ลบไม่ได้');
      setTimeout(()=>setToast(''),1800);
      return;
    }
    if (!confirm('ลบโครงการ ' + code + ' ใช่หรือไม่?')) return;
    setProjects(projects.filter(p => p.code !== code));
    setToast('ลบโครงการ ' + code + ' เรียบร้อย'); setTimeout(()=>setToast(''),1500);
  };

  const toggleActive = (code) => {
    setProjects(projects.map(p => p.code === code ? { ...p, active: !p.active } : p));
  };

  const saveEdit = (code) => {
    setProjects(projects.map(p => p.code === code ? { ...p, label: editLabel.trim() || p.code } : p));
    setEditingCode(null);
    setToast('แก้ไขชื่อโครงการเรียบร้อย ✓'); setTimeout(()=>setToast(''),1500);
  };

  return (
    <div>
      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:20 }}>
        <StatCard label="โครงการทั้งหมด" value={projects.length.toString()} sub={projects.filter(p=>p.active).length + ' ใช้งานอยู่'} icon="briefcase" accent="var(--primary)"/>
        <StatCard label="ใบเบิกตามโครงการ" value={totalUsed.toString()} sub="เดือนนี้" icon="receipt" accent="var(--mint)"/>
        <StatCard label="โครงการใช้บ่อยที่สุด" value="ALL" sub={sampleUsage.ALL + ' ใบ · ทั่วไป'} icon="tag" accent="var(--sun)"/>
        <StatCard label="โครงการไม่มีใบเบิก" value={Object.entries(sampleUsage).filter(([,v])=>v===0).length.toString()} sub="พิจารณาปิดใช้งาน" icon="alert" accent="var(--ink-3)"/>
      </div>

      <div className="card" style={{ padding:0, overflow:'hidden' }}>
        {/* Toolbar */}
        <div style={{ display:'flex', gap:10, padding:14, borderBottom:'1px solid var(--line)', background:'var(--surface-2)' }}>
          <div style={{ position:'relative', flex:1, maxWidth:320 }}>
            <Icons.search size={16} style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--ink-3)' }}/>
            <input className="input" placeholder="ค้นหารหัสโครงการ…" value={search} onChange={e=>setSearch(e.target.value)} style={{ paddingLeft:36 }}/>
          </div>
          <div style={{ flex:1 }}/>
          <button className="btn btn-soft"><Icons.download size={16}/> ส่งออก CSV</button>
          <button className="btn btn-accent" onClick={()=>setAdding(!adding)}>
            <Icons.plus size={16}/> เพิ่มโครงการ
          </button>
        </div>

        {/* Add row */}
        {adding && (
          <div className="fade-up" style={{ padding:'16px 18px', borderBottom:'1px solid var(--line)', background:'var(--primary-50)', display:'flex', gap:10, alignItems:'flex-end' }}>
            <div style={{ width:140 }}>
              <label style={{ fontSize:12, fontWeight:600, color:'var(--ink-2)', display:'block', marginBottom:4 }}>รหัสโครงการ *</label>
              <input className="input mono" value={newCode} onChange={e=>setNewCode(e.target.value.toUpperCase())}
                     placeholder="เช่น KMG" maxLength={6} autoFocus
                     style={{ fontWeight:700, fontSize:16, letterSpacing:'.05em' }}/>
            </div>
            <div style={{ flex:1 }}>
              <label style={{ fontSize:12, fontWeight:600, color:'var(--ink-2)', display:'block', marginBottom:4 }}>ชื่อโครงการ (ถ้ามี)</label>
              <input className="input" value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="เว้นว่างได้ — จะใช้รหัสเป็นชื่อ"/>
            </div>
            <div style={{ width:130 }}>
              <label style={{ fontSize:12, fontWeight:600, color:'var(--ink-2)', display:'block', marginBottom:4 }}>เริ่มโครงการ</label>
              <input className="input mono" type="month" value={newStart ? (String(+newStart.split('-')[0]-543).padStart(4,'0')+'-'+newStart.split('-')[1]) : ''}
                     onChange={e=>{ const v=e.target.value; if(!v){setNewStart('');return;} const [y,m]=v.split('-'); setNewStart((+y+543)+'-'+m); }}/>
            </div>
            <button className="btn btn-soft" onClick={()=>{setAdding(false); setNewCode(''); setNewLabel('');}}>ยกเลิก</button>
            <button className="btn btn-accent" onClick={addProject}>
              <Icons.check size={14}/> เพิ่ม
            </button>
          </div>
        )}

};

<script type="text/babel" data-presets="react,env">
// หน้าจอพิเศษ: กระทบยอดโยกเงิน (Reconcile) + การจัดสรรกำไร (Appropriation)

// ====== กระทบยอดโยกเงิน (สิ้นเดือน เข้า=ออก ต้องเป็น 0) ======
const ReconcileScreen = ({ role }) => {
  const monthLabel = budgetMonthOptions(4).find(o=>o.key===CURRENT_BUDGET_MONTH)?.label || 'พ.ค. 2569';
  // ข้อมูลตัวอย่าง — แต่ละหมวดโยกจับคู่ขา เข้า / ออก
  const groups = [
    { code:'5.1', label:'โอนเงินบัญชีหลัก/เงินสด ให้การตลาด', out:250000, in:250000,
      lines:[
        {d:'05/05', v:'TRF-2569-011', from:'บัญชีหลัก', to:'บัญชีการตลาด', amount:150000},
        {d:'18/05', v:'TRF-2569-024', from:'เงินสดย่อย', to:'บัญชีการตลาด', amount:100000},
      ]},
    { code:'5.2', label:'โอนภายในบัญชีหลัก', out:120000, in:120000,
      lines:[ {d:'09/05', v:'TRF-2569-016', from:'บัญชีหลัก', to:'บัญชีหลัก สำรอง', amount:120000} ]},
    { code:'5.3', label:'โอนบัญชีต่างประเทศ (เติม USDT)', out:109200, in:109200, tag:'บัญชีหลัก → บัญชีต่างประเทศ (USDT)',
      lines:[
        {d:'05/05', v:'TRF-2569-019', from:'บัญชีหลัก ดำเนินงาน', to:'บัญชีต่างประเทศ (USDT)', amount:109200},
        {d:'05/05', v:'FX-2569-001', from:'รับเข้า USDT', to:'—', amount:109200, isIn:true},
      ]},
    { code:'5.5', label:'เบิกเงินสดให้บัญชีหลัก', out:100000, in:100000, tag:'เงินสดออก = เข้าบัญชีหลัก',
      lines:[ {d:'27/05', v:'TRF-2569-040', from:'เงินสดย่อย', to:'บัญชีหลัก', amount:100000} ]},
    { code:'5.6', label:'ยืม-คืน Cashier', out:30000, in:30000,
      lines:[
        {d:'14/05', v:'TRF-2569-006', from:'บัญชีหลัก', to:'บัญชีพัก Cashier', amount:30000},
        {d:'26/05', v:'TRF-2569-009', from:'บัญชีพัก Cashier', to:'บัญชีหลัก', amount:30000, isIn:true},
      ]},
  ];
  const totalOut = groups.reduce((s,g)=>s+g.out,0);
  const totalIn  = groups.reduce((s,g)=>s+g.in,0);
  const totalNet = totalIn - totalOut;
  const [open, setOpen] = React.useState(null);

  return (
    <div data-screen-label="Reconcile">
      <PageHeader
        title="กระทบยอดโยกเงิน"
        sub={"ตรวจสอบรายการโยกเงินระหว่างบัญชี/แผนก (หมวด 5) — สิ้นเดือน เงินเข้าต้องเท่ากับเงินออก · " + monthLabel}
        crumbs={['หน้าหลัก','กระทบยอดโยกเงิน']}
        actions={<button className="btn btn-soft"><Icons.download size={16}/> ส่งออก</button>}
      />

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16, marginBottom:20 }}>
        <StatCard label="โยกออกรวม" value={fmtTHB(totalOut, {compact:true})} sub={groups.length + ' หมวด'} icon="arrowUp" accent="var(--peach)"/>
        <StatCard label="โยกเข้ารวม" value={fmtTHB(totalIn, {compact:true})} sub={groups.length + ' หมวด'} icon="arrowDown" accent="var(--mint)"/>
        <div className="card" style={{ padding:'18px 20px', display:'flex', flexDirection:'column', justifyContent:'center',
          background: totalNet===0 ? 'var(--mint-50)' : 'var(--rose-50)', border:'none' }}>
          <div style={{ fontSize:12, color: totalNet===0 ? '#0A7E64' : 'var(--bad)', fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em' }}>ผลต่างสุทธิ (ต้องเป็น 0)</div>
          <div className="display mono" style={{ fontSize:26, fontWeight:700, color: totalNet===0 ? '#0A7E64' : 'var(--bad)' }}>
            {totalNet===0 ? '✓ สมดุล' : fmtTHB(totalNet, {sign:true})}
          </div>
        </div>
      </div>

      <div className="card" style={{ padding:0, overflow:'hidden' }}>
        <table className="tbl">
          <thead><tr>
            <th>หมวด</th><th>รายการ</th>
            <th style={{ textAlign:'right' }}>โยกออก</th>
            <th style={{ textAlign:'right' }}>โยกเข้า</th>
            <th style={{ textAlign:'right' }}>ผลต่าง</th>
            <th style={{ textAlign:'center' }}>สถานะ</th>
          </tr></thead>
          <tbody>
            {groups.map(g => {
              const net = g.in - g.out;
              const ok = net === 0;
              const isOpen = open === g.code;
              return (
                <React.Fragment key={g.code}>
                  <tr onClick={()=>setOpen(isOpen?null:g.code)} style={{ cursor:'pointer', background: isOpen?'var(--primary-50)':'transparent' }}>
                    <td><span className="mono" style={{ fontWeight:700, color:'var(--primary)' }}>{g.code}</span></td>
                    <td>
                      <div style={{ fontWeight:600, fontSize:13 }}>{g.label}</div>
                      {g.tag && <div style={{ fontSize:11, color:'var(--ink-3)' }}>{g.tag}</div>}
                    </td>
                    <td className="mono" style={{ textAlign:'right', color:'#A8492A' }}>{fmtTHB(g.out)}</td>
                    <td className="mono" style={{ textAlign:'right', color:'#0A7E64' }}>{fmtTHB(g.in)}</td>
                    <td className="mono" style={{ textAlign:'right', fontWeight:700, color: ok?'var(--ink-3)':'var(--bad)' }}>{net===0?'0.00':fmtTHB(net, {sign:true})}</td>
                    <td style={{ textAlign:'center' }}>
                      {ok
                        ? <span className="badge" style={{ background:'var(--mint-50)', color:'#0A7E64' }}>✓ สมดุล</span>
                        : <span className="badge" style={{ background:'var(--rose-50)', color:'var(--bad)', fontWeight:700 }}>⚠ ไม่สมดุล</span>}
                    </td>
                  </tr>
                  {isOpen && (
                    <tr>
                      <td colSpan="6" style={{ padding:0, background:'var(--surface-2)' }}>
                        <div style={{ padding:'10px 22px' }}>
                          {g.lines.map((ln, i) => (
                            <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'7px 0', borderBottom: i<g.lines.length-1?'1px dashed var(--line)':'none', fontSize:12.5 }}>
                              <span className="mono" style={{ color:'var(--ink-3)', width:46 }}>{ln.d}</span>
                              <span className="mono" style={{ color:'var(--primary)', width:120 }}>{ln.v}</span>
                              <span style={{ flex:1, color:'var(--ink-2)' }}>{ln.from} <span style={{ color:'var(--ink-3)' }}>→</span> {ln.to}</span>
                              <span className="mono" style={{ fontWeight:600, color: ln.isIn?'#0A7E64':'#A8492A' }}>{ln.isIn?'+':'−'}{fmtTHB(ln.amount).replace('฿','฿')}</span>
                            </div>
                          ))}
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:'var(--ink)', color:'white' }}>
              <td colSpan="2" style={{ padding:'14px', fontWeight:700 }}>รวมทั้งหมด</td>
              <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#FFAFBE' }}>{fmtTHB(totalOut)}</td>
              <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#7BF1CE' }}>{fmtTHB(totalIn)}</td>
              <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700 }}>{totalNet===0?'0.00':fmtTHB(totalNet,{sign:true})}</td>
              <td style={{ textAlign:'center', padding:'14px' }}>{totalNet===0?'✓':'⚠'}</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div style={{ marginTop:14, padding:'12px 16px', background:'var(--sun-50)', borderRadius:10, fontSize:12.5, color:'#9C5C2A', display:'flex', alignItems:'center', gap:8 }}>
        <Icons.alert size={14}/> หมวดที่ไม่สมดุลคือเงินขาด/เกินที่ต้องตรวจสอบ (เช่น 5.3) — โยกเงินไม่กระทบงบกำไรขาดทุน
      </div>
    </div>
  );
};

window.ReconcileScreen = ReconcileScreen;

// ====== การจัดสรรกำไร (Appropriation) — ใต้เส้นกำไรขั้นต้น · ผจก./ผบห. เท่านั้น ======
const AppropriationScreen = ({ role }) => {
  const [period, setPeriod] = React.useState('month');
  const [budgetMonth, setBudgetMonth] = React.useState(CURRENT_BUDGET_MONTH);
  const M = period === 'month' ? 1 : period === 'ytd' ? 5 : 12;
  const monthLabel = budgetMonthOptions(4).find(o=>o.key===budgetMonth)?.label || 'พ.ค. 2569';
  const pLong = period==='month' ? ('รายเดือน ' + monthLabel) : period==='ytd' ? 'สะสม YTD ม.ค.–พ.ค. 2569' : 'รายปี 2569';

  // คำนวณกำไรขั้นต้น (ฐานเดียวกับหน้ารายงาน)
  const revReceived = Math.round(2840600 * M);
  const revCashier  = Math.round(485200 * M);
  const contraRev   = Math.round(18000 * M);     // หมวด 5.4 คืนรายรับเกิน
  const netRevenue  = revReceived + revCashier - contraRev;
  const totalCost   = Math.round((186420 + 28400 + 412100 + 235800) * M);
  const grossProfit = netRevenue - totalCost;

  // 6.1 Profit Sharing CPO 5% ของกำไรขั้นต้น
  const cpo = Math.round(grossProfit * 0.05);
  // 6.2 ส่วนของผู้ถือหุ้น — ตัวอย่าง
  const equity = Math.round(800000 * M);
  const totalApprop = cpo + equity;
  const netAfter = grossProfit - totalApprop;

  // รายการตั้งเบิกตัวอย่าง
  const claims = [
    { id:'AP-2569-002', date:'25 พ.ค. 2569', code:'6.1', label:'Profit Sharing CPO 5%', amount:cpo, by:'ธีรพัฒน์ ศรีสุวรรณ', status:'paid' },
    { id:'AP-2569-001', date:'25 พ.ค. 2569', code:'6.2', label:'ส่วนของผู้ถือหุ้น — ปันผลผู้ถือหุ้น Q2', amount:equity, by:'ผู้บริหาร', status:'topay' },
  ];
  const [newOpen, setNewOpen] = React.useState(false);

  const Line = ({ l, v, sub, total, neg, accent, big }) => (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline',
      padding: total?'14px 16px':'9px 16px',
      background: total ? (accent || 'var(--surface-2)') : 'transparent',
      borderRadius: total?10:0, marginTop: total?6:0,
      borderTop: total?'2px solid var(--ink)':'none' }}>
      <div>
        <span style={{ fontWeight: total?700:500, fontSize: total?(big?16:14):13.5, color: total?'var(--ink)':'var(--ink-2)' }}>{l}</span>
        {sub && <span style={{ fontSize:11, color:'var(--ink-3)', marginLeft:8 }}>{sub}</span>}
      </div>
      <span className="mono" style={{ fontWeight: total?700:600, fontSize: total?(big?20:15):14,
        color: neg ? '#A8492A' : total ? 'var(--ink)' : 'var(--ink)' }}>
        {neg?'− ':''}{fmtTHB(Math.abs(v))}
      </span>
    </div>
  );

  return (
    <div data-screen-label="Appropriation">
      <PageHeader
        title="การจัดสรรกำไร"
        sub="Profit Sharing CPO 5% และส่วนของผู้ถือหุ้น — คำนวณจากกำไรขั้นต้น · เห็นเฉพาะผู้จัดการและผู้บริหาร"
        crumbs={['หน้าหลัก','การจัดสรรกำไร']}
        actions={<>
          <div style={{ display:'flex', gap:4, padding:4, background:'var(--surface-2)', borderRadius:10 }}>
            {[{k:'month', l:'รายเดือน'}, {k:'ytd', l:'YTD'}, {k:'year', l:'รายปี'}].map(p => {
              const sel = period === p.k;
              return <button key={p.k} onClick={()=>setPeriod(p.k)} style={{ padding:'8px 16px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                background: sel?'white':'transparent', color: sel?'var(--ink)':'var(--ink-2)', fontSize:13, fontWeight:600, boxShadow: sel?'0 1px 3px rgba(0,0,0,.08)':'none' }}>{p.l}</button>;
            })}
          </div>
          {period==='month' && (
            <select className="input" value={budgetMonth} onChange={e=>setBudgetMonth(e.target.value)} style={{ width:150, height:38, fontSize:13 }}>
              {budgetMonthOptions(4).map(o => <option key={o.key} value={o.key}>{o.label}</option>)}

  const daysSince = (iso) => Math.max(0, Math.floor((TODAY - new Date(iso)) / 86400000));
  const returnedSum = (d) => (d.returns || []).reduce((s,r)=>s+r.amount, 0);
  const outstanding = (d) => d.amount - returnedSum(d);
  const isReturned = (d) => outstanding(d) <= 0;

  const countOutstanding = deposits.filter(d=>!isReturned(d)).length;
  const totalReturned = deposits.reduce((s,d)=>s+returnedSum(d), 0);

                      : <span className="mono" style={{ fontSize:12, fontWeight:700, color: age>90?'var(--bad)':'var(--ink-2)' }}>{age} วัน</span>}
                  </td>
                  <td className="mono" style={{ textAlign:'right', fontWeight:700 }}>{fmtTHB(d.amount)}</td>

              <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#7BF1CE' }}>{fmtTHB(rows.reduce((s,d)=>s+returnedSum(d),0))}</td>
              <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#FFCB47' }}>{fmtTHB(rows.reduce((s,d)=>s+Math.max(0,outstanding(d)),0))}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>

      {returnOpen && <ReturnDepositDialog dep={returnOpen} outstanding={outstanding(returnOpen)} acctLabel={acctLabel}
        onClose={()=>setReturnOpen(null)} onSave={doReturn}/>}
      {toast && <Toast text={toast}/>}
    </div>
  );
};

<script type="text/babel" data-presets="react,env">
// Cash submission screens (Cashier → Finance)

const CashSubmissions = ({ role, staffDept }) => {
  const [tab, setTab] = React.useState('received');
  const [submissions, setSubmissions] = React.useState(CASH_SUBMISSIONS);
  const [newOpen, setNewOpen] = React.useState(false);
  const [receiveOpen, setReceiveOpen] = React.useState(null);
  const [editingId, setEditingId] = React.useState(null);
  const [editDraft, setEditDraft] = React.useState({});
  const [toast, setToast] = React.useState('');
  const fileInputRef = React.useRef(null);

  const isCashier = role === 'staff' && staffDept === 'cashier';
  const isFinance = role === 'finance';
  const canReceive = role === 'finance' || role === 'manager';
  const canEdit = role === 'manager';
  const [period, setPeriod] = React.useState('today');
  const [colFilters, setColFilters] = React.useState({});
  const setCF = (col, v) => setColFilters(prev => {
    const cur = new Set(prev[col] || []);
    cur.has(v) ? cur.delete(v) : cur.add(v);
    return { ...prev, [col]: cur };
  });
  const clearCF = (col) => setColFilters(prev => ({ ...prev, [col]: new Set() }));
  const cfHas = (col, v) => { const s = colFilters[col]; return !s || s.size === 0 || s.has(v); };
  const cfSet = (col) => colFilters[col] || new Set();

  // Date-range filters (ปฏิทิน) สำหรับ วันที่บันทึก + ยอดขายวันที่
  const [dateRanges, setDateRanges] = React.useState({});
  const setRange = (col, key, val) => setDateRanges(prev => ({ ...prev, [col]: { ...(prev[col]||{}), [key]: val } }));
  const clearRange = (col) => setDateRanges(prev => ({ ...prev, [col]: {} }));
  const thaiToISO = (str) => {
    if (!str) return '';
    const m = str.match(/(\d{1,2})\s+([^\s]+)\s+(\d{4})/);
    if (!m) return '';
    const day = m[1].padStart(2,'0');
    const mi = THAI_MONTHS.indexOf(m[2]);
    if (mi < 0) return '';
    const greg = parseInt(m[3],10) - 543;
    return `${greg}-${String(mi+1).padStart(2,'0')}-${day}`;
  };
  const inRange = (iso, col) => {
    const r = dateRanges[col]; if (!r || (!r.from && !r.to)) return true;
    if (!iso) return false;
    if (r.from && iso < r.from) return false;
    if (r.to && iso > r.to) return false;
    return true;
  };

  const pending  = submissions.filter(s => s.status === 'pending');
  const received = submissions.filter(s => s.status === 'received');
  const mine     = submissions.filter(s => s.cashier === 'จิราภรณ์ สุขใจ');

  const tabs = [];
  if (isCashier) tabs.push({k:'mine', l:'การส่งของฉัน', n:mine.length, c:'var(--sky)'});
  if (!isCashier) tabs.push({k:'pending', l:'รอรับเงิน', n:pending.length, c:'var(--sun)'});
  tabs.push({k:'received', l:'รับแล้ว', n:received.length, c:'var(--good)'});
  tabs.push({k:'all', l:'ทั้งหมด', n:submissions.length, c:'var(--ink)'});

  let rows;
  if (tab==='mine') rows = mine;
  else if (tab==='pending') rows = pending;
  else if (tab==='received') rows = received;
  else rows = submissions;

  // helper: source ที่ใช้แสดง/กรอง (contra = 5.4 มีป้ายพิเศษ)
  const srcOf = (r) => r.contra ? ('คืนรายรับนำส่งเกิน (5.4)' + (r.project ? ' · ' + r.project : '')) : r.source;
  // Apply column multi-filters
  rows = rows.filter(r => {
    const bankLabel = r.depositedTo ? (COMPANY_BANKS.find(b=>b.id===r.depositedTo)?.label || '') : '—';
    const statusLabel = r.status === 'received' ? 'รับแล้ว' : 'รอรับ';
    return inRange(thaiToISO(r.enteredAt || r.date), 'enteredAt') && inRange(r.saleDate || '', 'saleDate')
      && cfHas('cashier', r.cashier) && cfHas('source', srcOf(r))
      && cfHas('project', r.project || '—') && cfHas('bank', bankLabel)
      && cfHas('status', statusLabel);
  });

  const uniq = (arr) => [...new Set(arr)];
  const allRows = tab==='mine' ? mine : tab==='pending' ? pending : tab==='received' ? received : submissions;

  const totalPending = pending.reduce((s,r)=>s+r.amount,0);
  const totalReceived = received.reduce((s,r)=>s+r.amount,0);

  // ===== Export / Import CSV =====
  const CSV_COLS = ['id','date','enteredAt','saleDate','cashier','amount','source','project','status','depositedTo','receivedBy','receivedAt','note','contra'];
  const csvEsc = (v) => { const s = (v===undefined||v===null) ? '' : String(v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  const exportCSV = () => {
    const header = CSV_COLS.join(',');
    const lines = rows.map(r => CSV_COLS.map(c => csvEsc(r[c])).join(','));
    const csv = '\uFEFF' + [header, ...lines].join('\n');   // BOM เพื่อให้ Excel อ่านภาษาไทยถูก
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `รายรับ_${tab}_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    setToast(`Export ${rows.length} รายการเรียบร้อย ✓`); setTimeout(()=>setToast(''),1800);
  };
  const parseCSV = (text) => {
    const rowsArr = []; let cur = []; let field = ''; let inQ = false;
    text = text.replace(/^\uFEFF/, '');
    for (let i=0;i<text.length;i++){ const ch=text[i];
      if (inQ){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=ch; }
      else { if(ch==='"') inQ=true; else if(ch===',') { cur.push(field); field=''; }
        else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n') i++; cur.push(field); field=''; if(cur.some(c=>c!=='')) rowsArr.push(cur); cur=[]; }
        else field+=ch; } }
    if (field!=='' || cur.length) { cur.push(field); if(cur.some(c=>c!=='')) rowsArr.push(cur); }
    return rowsArr;
  };
  const importCSV = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = parseCSV(e.target.result);
        if (data.length < 2) { setToast('ไฟล์ว่างหรือรูปแบบไม่ถูกต้อง'); setTimeout(()=>setToast(''),2200); return; }
        const head = data[0].map(h=>h.trim());
        const idx = (c) => head.indexOf(c);
        const imported = data.slice(1).map((cells, i) => {
          const get = (c) => { const j = idx(c); return j>=0 ? cells[j] : ''; };
          const cashier = get('cashier') || ME.staff.name;
          return {
            id: get('id') || ('CSH-IMP-' + Date.now() + '-' + i),
            date: get('date') || nowDateTimeTH().split(' ').slice(0,3).join(' '),
            enteredAt: get('enteredAt') || nowDateTimeTH(),
            saleDate: get('saleDate') || '',
            cashier, cashierShort: firstName(cashier).slice(0,2),
            amount: parseFloat(get('amount')) || 0,
            source: get('source') || '',
            project: get('project') || 'ADN',
            status: get('status') || 'pending',
            depositedTo: get('depositedTo') || '',
            receivedBy: get('receivedBy') || '',
            receivedAt: get('receivedAt') || '',
            note: get('note') || '',
            contra: get('contra')==='true' || get('contra')==='1',
          };
        });
        setSubmissions([...imported, ...submissions]);
        setToast(`Import ${imported.length} รายการเรียบร้อย ✓`); setTimeout(()=>setToast(''),1800);
      } catch (err) {
        setToast('อ่านไฟล์ไม่สำเร็จ: ' + err.message); setTimeout(()=>setToast(''),2500);
      }
    };
    reader.readAsText(file, 'utf-8');
  };
  const ImportExportBtns = () => (
    <>
      <input ref={fileInputRef} type="file" accept=".csv,text/csv" style={{ display:'none' }}
        onChange={e=>{ const f=e.target.files[0]; if(f) importCSV(f); e.target.value=''; }}/>
      <button className="btn btn-soft" onClick={()=>fileInputRef.current && fileInputRef.current.click()} title="นำเข้าจากไฟล์ CSV">
        <Icons.upload size={15}/> Import
      </button>
      <button className="btn btn-soft" onClick={exportCSV} title="ส่งออกรายการที่แสดงเป็นไฟล์ CSV">
        <Icons.download size={15}/> Export
      </button>
    </>
  );

  return (
    <div data-screen-label="10 Cash Submissions">
      <PageHeader
        title={isCashier ? "รายรับ — นำส่งเงินสดให้ฝ่ายการเงิน" : "รายรับ"}
        sub={isCashier
          ? "ส่งเงินสดที่เก็บได้จากลูกค้า ให้ฝ่ายการเงินบันทึกเข้าบัญชีบริษัท"
          : "Cashier ส่งเงินสด — รับและฝากเข้าบัญชีบริษัท พร้อมบันทึกบัญชี"}
        crumbs={['หน้าหลัก','รายรับ']}
        actions={isCashier ? (
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <ImportExportBtns/>
            <button className="btn btn-accent" onClick={()=>setNewOpen(true)}>
              <Icons.plus size={16}/> ส่งเงินใหม่
            </button>
          </div>
        ) : (
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ display:'flex', gap:4, padding:4, background:'var(--surface-2)', borderRadius:10 }}>
              {[{k:'yesterday', l:'เมื่อวานนี้'},{k:'today', l:'วันนี้'},{k:'month', l:'เดือนนี้'}].map(p => {
                const sel = period === p.k;
                return (
                  <button key={p.k} onClick={()=>setPeriod(p.k)} style={{
                    padding:'7px 14px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                    background: sel ? 'white' : 'transparent', color: sel ? 'var(--ink)' : 'var(--ink-2)',
                    fontSize:13, fontWeight:600, boxShadow: sel ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
                  }}>{p.l}</button>
                );
              })}
            </div>
            <ImportExportBtns/>
            {(isFinance || role === 'manager') && (
              <button className="btn btn-accent" onClick={()=>setNewOpen(true)}>
                <Icons.plus size={16}/> บันทึกรายรับ
              </button>
            )}
          </div>
        )}
      />

      {!isCashier && (() => {
        const showCash = role === 'manager' || role === 'finance';
        const cols = showCash ? 4 : 3;
        return (
        <div style={{ display:'grid', gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:16, marginBottom:24 }}>
          <StatCard label="รอรับเงิน" value={pending.length.toString()} sub={fmtTHB(totalPending)} icon="clock" accent="var(--sun)"/>
          <StatCard label={period==='month'?'รับแล้วเดือนนี้': period==='yesterday'?'รับแล้วเมื่อวาน':'รับแล้ววันนี้'} value={received.length.toString()} sub={fmtTHB(totalReceived)} icon="check" accent="var(--good)"
                    spark={[2,3,2,4,3,5,4,6,5,7,6,8]}/>
          {showCash && <StatCard label="เงินสดในมือ" value={fmtTHB(CASH_ACCOUNT.balance, {compact:true})} sub="หลังลงบัญชีล่าสุด" icon="wallet" accent="var(--primary)"/>}
          <StatCard label="โดยเฉลี่ย / วัน" value={fmtTHB(15400)} sub="7 วันย้อนหลัง" icon="trending" accent="var(--peach)"/>
        </div>
        );
      })()}

      {isCashier && <CashierTodayByProject submissions={submissions}/>}

      {/* Quick role context */}
      <div className="card" style={{
        padding:'14px 18px', marginBottom:20,
        background: isCashier ? 'linear-gradient(135deg, var(--sky-50), var(--mint-50))'
                  : isFinance ? 'linear-gradient(135deg, var(--peach-50), var(--sun-50))'
                  : 'var(--surface-2)',
        border:'none', display:'flex', alignItems:'center', gap:14
      }}>
        <div style={{ width:40, height:40, borderRadius:12, background:'white', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--primary)' }}>
          <Icons.send size={20}/>
        </div>
        <div style={{ flex:1 }}>
          {isCashier && <>
            <div style={{ fontSize:14, fontWeight:700, color:'#1F6FA8' }}>โหมด Cashier</div>
            <div style={{ fontSize:12, color:'var(--ink-2)' }}>เมื่อรับเงินสดจากลูกค้าให้กด "ส่งเงินใหม่" เพื่อส่งให้ฝ่ายการเงิน</div>
          </>}
          {isFinance && <>
            <div style={{ fontSize:14, fontWeight:700, color:'#A8492A' }}>โหมดฝ่ายการเงิน</div>
            <div style={{ fontSize:12, color:'var(--ink-2)' }}>ตรวจรับเงินสดจาก Cashier → เลือกบัญชีบริษัทที่จะฝาก → ระบบลงบัญชีอัตโนมัติ</div>
          </>}
          {!isCashier && !isFinance && <>
            <div style={{ fontSize:14, fontWeight:700 }}>ภาพรวมการส่งเงินสด</div>
            <div style={{ fontSize:12, color:'var(--ink-2)' }}>ติดตามการส่งเงินจาก Cashier ทั้งหมด</div>
          </>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', gap:8, marginBottom:16 }}>
        {tabs.map(t => (
          <button key={t.k} onClick={()=>setTab(t.k)} className="card" style={{
            flex:1, padding:'14px 18px', textAlign:'left', cursor:'pointer', fontFamily:'inherit',
            background: tab===t.k?'var(--ink)':'white', color: tab===t.k?'white':'inherit',
            border: tab===t.k?'1px solid var(--ink)':'1px solid var(--line)'
          }}>
            <div style={{ fontSize:11, opacity:tab===t.k?.7:1, color:tab===t.k?'white':'var(--ink-3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.06em' }}>{t.l}</div>
            <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginTop:4 }}>
              <div className="display" style={{ fontSize:24, fontWeight:700 }}>{t.n}</div>
            </div>
          </button>
        ))}
      </div>

      {/* Table */}
      <div className="card" style={{ padding:0, overflow:'hidden' }}>
        <div style={{ display:'flex', gap:8, padding:14, borderBottom:'1px solid var(--line)', background:'var(--surface-2)', flexWrap:'wrap' }}>
          <DateRangeFilter label="วันที่บันทึก" icon="clock" range={dateRanges['enteredAt']||{}}
            onFrom={v=>setRange('enteredAt','from',v)} onTo={v=>setRange('enteredAt','to',v)} onClear={()=>clearRange('enteredAt')}/>
          <DateRangeFilter label="ยอดขายวันที่" icon="calendar" range={dateRanges['saleDate']||{}}
            onFrom={v=>setRange('saleDate','from',v)} onTo={v=>setRange('saleDate','to',v)} onClear={()=>clearRange('saleDate')}/>
          <MultiFilter label="Cashier" icon="user"
            options={uniq(allRows.map(r=>r.cashier)).map(v=>({value:v,label:v}))}
            selected={cfSet('cashier')} onToggle={(v)=>setCF('cashier',v)} onClear={()=>clearCF('cashier')}/>
          <MultiFilter label="แหล่งที่มา" icon="tag"
            options={uniq(allRows.map(r=>srcOf(r))).map(v=>({value:v,label:v}))}
            selected={cfSet('source')} onToggle={(v)=>setCF('source',v)} onClear={()=>clearCF('source')}/>
          <MultiFilter label="โครงการ" icon="briefcase"
            options={uniq(allRows.map(r=>r.project||'—')).map(v=>({value:v,label:v}))}
            selected={cfSet('project')} onToggle={(v)=>setCF('project',v)} onClear={()=>clearCF('project')}/>
          <MultiFilter label="ธนาคาร/บัญชี" icon="wallet"
            options={uniq(allRows.map(r=> r.depositedTo ? (COMPANY_BANKS.find(b=>b.id===r.depositedTo)?.label||'') : '—')).map(v=>({value:v,label:v}))}
            selected={cfSet('bank')} onToggle={(v)=>setCF('bank',v)} onClear={()=>clearCF('bank')}/>
          <MultiFilter label="สถานะ" icon="check"
            options={[{value:'รับแล้ว',label:'รับแล้ว'},{value:'รอรับ',label:'รอรับ'}]}
            selected={cfSet('status')} onToggle={(v)=>setCF('status',v)} onClear={()=>clearCF('status')}/>
        </div>
        <table className="tbl">
          <thead><tr>
            <th>เลขที่</th><th>วันที่บันทึก</th><th>ยอดขายวันที่</th><th>Cashier</th><th>แหล่งที่มา</th>
            <th>โครงการ</th>
            <th style={{ textAlign:'right' }}>จำนวน</th>
            <th>ธนาคาร/บัญชี</th>
            <th>สถานะ</th>
            <th></th>
          </tr></thead>
          <tbody>
            {rows.length === 0 ? (
              <tr><td colSpan="10" style={{ padding:'40px', textAlign:'center', color:'var(--ink-3)' }}>
                ไม่มีรายการในแท็บนี้
              </td></tr>
            ) : rows.map(r => {
              const depBank = r.depositedTo ? COMPANY_BANKS.find(b=>b.id===r.depositedTo) : null;
              const depBankInfo = depBank ? BANKS.find(x=>x.code===depBank.bank) : null;
              return (
                <tr key={r.id}>
                  <td className="mono" style={{ color:'var(--primary)', fontWeight:600 }}>{r.id}</td>
                  <td className="mono" style={{ fontSize:12, color:'var(--ink-2)' }}>{r.enteredAt || r.date}</td>
                  <td className="mono" style={{ fontSize:12 }}>{r.saleDate || '—'}</td>
                  <td>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <Avatar short={r.cashierShort} size={30}/>
                      <span style={{ fontSize:13, fontWeight:600 }}>{firstName(r.cashier)}</span>
                    </div>
                  </td>
                  <td style={{ color:'var(--ink-2)', maxWidth:240 }}>
                    {r.contra
                      ? <span style={{ color:'#9C5C2A', fontWeight:600 }}>คืนรายรับนำส่งเกิน (5.4){r.project ? ' · ' + r.project : ''}</span>
                      : r.source}
                    {r.note && <div style={{ fontSize:11, color:'var(--ink-3)' }}>{r.note}</div>}
                  </td>
                  <td>{r.project ? <ProjectCell code={r.project}/> : <span style={{ color:'var(--ink-3)' }}>—</span>}</td>
                  <td className="mono" style={{ textAlign:'right', fontWeight:700, fontSize:15, color: r.contra ? 'var(--bad)' : 'inherit' }}>{fmtTHB(r.amount)}</td>
                  <td>
                    {r.depositedTo === 'cash' ? (
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <div style={{ width:24, height:24, borderRadius:6, background:'#FFCB47', color:'#3A1F0A',
                                      display:'flex', alignItems:'center', justifyContent:'center',
                                      fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:11 }}>฿</div>
                        <span style={{ fontSize:12 }}>เงินสดย่อย</span>
                      </div>
                    ) : depBank ? (
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <div style={{ width:24, height:24, borderRadius:6, background:depBankInfo?.color, color:'white',
                                      display:'flex', alignItems:'center', justifyContent:'center',
                                      fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:10 }}>{depBankInfo?.short}</div>
                        <span style={{ fontSize:12 }}>{depBank.label}</span>
                      </div>
                    ) : <span style={{ color:'var(--ink-3)', fontSize:12 }}>—</span>}
                  </td>
                  <td>
                    <Badge kind={r.status === 'received' ? 'paid' : 'pending'}>
                      {r.status === 'received' ? '✓ รับแล้ว' : 'รอรับ'}
                    </Badge>
                    {r.receivedBy && <div style={{ fontSize:10, color:'var(--ink-3)', marginTop:2 }}>โดย {r.receivedBy.split(' ')[0]} · {r.receivedAt}</div>}
                  </td>
                  <td>
                    {r.status === 'pending' && canReceive && (
                      <button onClick={()=>setReceiveOpen(r)} className="btn" style={{ height:30, padding:'0 12px', background:'var(--mint)', color:'var(--ink)' }}>
                        <Icons.check size={13}/> รับและลงบัญชี
                      </button>
                    )}
                    {r.status === 'received' && (
                      <button className="btn btn-soft" style={{ height:30, padding:'0 10px', fontSize:12 }}>
                        <Icons.eye size={12}/> ดู JV
                      </button>
                    )}
                    {canEdit && (
                      <button onClick={()=>{ setEditingId(r.id); setEditDraft({...r}); }} className="btn btn-soft" style={{ height:30, padding:'0 10px', fontSize:12, marginLeft:6 }}>
                        ✏️ แก้ไข
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
          {rows.length > 0 && (
            <tfoot>
              <tr style={{ background:'var(--surface-2)', fontWeight:700 }}>
                <td colSpan="6" style={{ padding:'14px 18px', fontSize:13 }}>รวม {rows.length} รายการ</td>
                <td className="mono" style={{ textAlign:'right', padding:'14px 18px', fontSize:15 }}>{fmtTHB(rows.reduce((s,r)=>s+r.amount,0))}</td>
                <td colSpan="3"/>
              </tr>
            </tfoot>
          )}
        </table>
      </div>

      {newOpen && <NewCashSubmission onClose={()=>setNewOpen(false)} onSubmit={(sub)=>{
        const next = [{ ...sub, id:'CSH-2569-'+String(19 + submissions.length).padStart(3,'0'),
                        cashier:ME.staff.name, cashierShort:'JS', date:'24 พ.ค. 2569', enteredAt: nowDateTimeTH(),
                        status:'pending' }, ...submissions];
        setSubmissions(next);
        setNewOpen(false);
        setToast('ส่งเงินไปฝ่ายการเงินเรียบร้อย ✓'); setTimeout(()=>setToast(''),1800);
      }}/>}

      {receiveOpen && <ReceiveCashDialog submission={receiveOpen} onClose={()=>setReceiveOpen(null)}
        onReceive={(depositId) => {
          setSubmissions(submissions.map(s => s.id === receiveOpen.id
            ? { ...s, status:'received', receivedBy:'วรพรรณ รุ่งโรจน์', receivedAt:'24 พ.ค. 17:00', depositedTo: depositId }
            : s));
          setReceiveOpen(null);
          setToast('รับเงินและลงบัญชีเรียบร้อย ✓'); setTimeout(()=>setToast(''),1800);
        }}/>}

      {editingId && <EditCashSubmission draft={editDraft} setDraft={setEditDraft}
        onClose={()=>{ setEditingId(null); setEditDraft({}); }}
        onSave={()=>{
          setSubmissions(submissions.map(s => s.id === editingId
            ? { ...s, saleDate: editDraft.saleDate, amount: +editDraft.amount, source: editDraft.source, project: editDraft.project }
            : s));
          setEditingId(null); setEditDraft({});
          setToast('บันทึกการแก้ไขเรียบร้อย ✓'); setTimeout(()=>setToast(''),1800);
        }}/>}

      {toast && <Toast text={toast}/>}
    </div>
  );
};

// Manager edit dialog — แก้ไขรายการรายรับในตาราง
const EditCashSubmission = ({ draft, setDraft, onClose, onSave }) => {
  const todayStr = new Date().toISOString().slice(0,10);
  const sd = draft.saleDate || '';
  const saleDateValid = sd && sd <= todayStr;
  const filled = draft.amount && +draft.amount > 0 && saleDateValid;
  const setF = (k,v) => setDraft({ ...draft, [k]: v });
  return (
    <div className="overlay" style={{ position:'fixed', inset:0, background:'rgba(20,16,40,.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:60, padding:20 }} onClick={onClose}>
      <div className="card fade-up" style={{ width:440, maxWidth:'100%', padding:0, overflow:'hidden' }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding:'18px 28px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', gap:10 }}>
          <Icons.edit size={18} style={{ color:'var(--primary)' }}/>
          <div>
            <div className="display" style={{ fontSize:16, fontWeight:700 }}>แก้ไขรายการรายรับ</div>
            <div className="mono" style={{ fontSize:12, color:'var(--ink-3)' }}>{draft.id}</div>
          </div>
        </div>
        <div style={{ padding:'20px 28px' }}>
          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>ยอดขายวันที่ *</label>
            <input className="input mono" type="date" value={sd} max={todayStr} onChange={e=>setF('saleDate', e.target.value)} style={{ fontWeight:600 }}/>

// ============ Cashier daily-by-project view ============
const CashierDailyByProject = ({ submissions }) => {
  // Build last 10 days × projects matrix
  const today = 24;
  const days = Array.from({length:10}, (_, i) => today - 9 + i); // 15..24
  // Sample data: project amounts per day (mock)
  const seed = (proj, day) => {
    const codes = ['ADN','BIW','MMA','JDX','ALL'];
    if (!codes.includes(proj)) return 0;
    const base = { ADN: 12000, BIW: 18000, MMA: 9000, JDX: 7500, ALL: 4200 };
    const v = Math.round(base[proj] * (0.5 + Math.abs(Math.sin(day*1.1 + proj.charCodeAt(0)*0.3))));
    return day % (codes.indexOf(proj)+2) === 0 ? 0 : v;
  };
  const projects = ['ADN','BIW','MMA','JDX','ALL'];
  const dayTotals = days.map(d => projects.reduce((s,p)=>s+seed(p,d), 0));
  const grandTotal = dayTotals.reduce((s,n)=>s+n, 0);

  return (
    <div className="card" style={{ padding:'20px 22px', marginBottom:24 }}>
      <SectionHead
        title="ยอดรับรายวันแยกตามโครงการ"
        sub={`10 วันย้อนหลัง · รวมรับ ${fmtTHB(grandTotal)}`}
        right={<button className="btn btn-soft" style={{ height:30 }}><Icons.download size={14}/> Excel</button>}/>
      <div style={{ overflowX:'auto' }}>
      <table className="tbl" style={{ minWidth:780 }}>
        <thead><tr>
          <th>วันที่</th>
          {projects.map(p => <th key={p} style={{ textAlign:'right' }}>{p}</th>)}
          <th style={{ textAlign:'right', background:'var(--primary-50)', color:'var(--primary)' }}>รวม</th>
        </tr></thead>
        <tbody>
          {days.map((d, i) => {
            const vals = projects.map(p => seed(p, d));
            const dt = vals.reduce((s,n)=>s+n, 0);
            const isToday = d === today;
            return (
              <tr key={d} style={{ background: isToday ? 'var(--sun-50)' : 'transparent' }}>
                <td className="mono" style={{ fontWeight: isToday?700:500 }}>
                  {String(d).padStart(2,'0')}/05 {isToday && <span className="badge" style={{ marginLeft:6, background:'var(--sun)', color:'#3A1F0A', height:18, padding:'0 6px', fontSize:10 }}>วันนี้</span>}
                </td>
                {vals.map((v,j) => (
                  <td key={j} className="mono" style={{ textAlign:'right', color: v>0?'var(--ink)':'var(--ink-3)', fontWeight: v>0?600:400 }}>
                    {v>0 ? fmtTHB(v) : '—'}
                  </td>
                ))}
                <td className="mono" style={{ textAlign:'right', fontWeight:700, background:'var(--primary-50)', color:'var(--primary)' }}>
                  {fmtTHB(dt)}
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{ background:'var(--ink)', color:'white' }}>
            <td style={{ padding:'14px', fontWeight:700 }}>รวม 10 วัน</td>
            {projects.map((p, j) => {
              const sum = days.reduce((s,d)=>s+seed(p,d), 0);
              return <td key={j} className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700 }}>{fmtTHB(sum)}</td>;
            })}
            <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#7BF1CE' }}>{fmtTHB(grandTotal)}</td>
          </tr>
        </tfoot>
      </table>
      </div>
    </div>
  );
};

    document.documentElement.style.setProperty('--primary', a.color);
  }, [t.accentName]);

  // Reset page if role doesn't have current page
  React.useEffect(() => {
    const nav = NAV.find(n => n.key === page);
    if (!nav || !nav.roles.includes(role)) setPage('dashboard');
  }, [role]);

  if (t.showLogin) {
    return <Login role={role} setRole={(k)=>setTweak({role:k})} onLogin={()=>setTweak({showLogin:false})}/>;
  }

  const navItems = NAV.filter(n => {
    if (!n.roles.includes(role)) return false;
    // For staff with depts filter, only show if staffDept matches
    if (role === 'staff' && n.depts && !n.depts.includes(staffDept)) return false;
    return true;
  });
  const counts = {
    pending: CLAIMS.filter(c=>c.status==='pending').length,
    toPay:   CLAIMS.filter(c=>c.status==='topay').length,
  };

  const dashByRole = {
    staff: (role === 'staff' && staffDept === 'cashier') ? <DashCashier go={setPage}/> : <DashStaff/>,
    accountant: <DashManager go={setPage} role={role}/>,
    finance: <DashFinance go={setPage} role={role}/>,
    manager: <DashManager go={setPage} role={role}/>,
    executive: <DashExecutive/>,
    admin: <DashAdmin/>,
  };

  const screens = {
    dashboard: dashByRole[role],
    documents: <Documents role={role} go={setPage}/>,
    expense:   <ExpenseForm go={go} role={role} staffDept={staffDept} me={me} presetGroup={pageArg?.presetGroup}/>,
    approval:  <Approval role={role}/>,
    journal:   <Journal role={role} go={go}/>,
    payment:   <Payment role={role}/>,
    companybanks: <CompanyBanks role={role}/>,
    cashsubmit:   <CashSubmissions role={role} staffDept={staffDept}/>,
    reports:   <Reports role={role}/>,
    reconcile: <ReconcileScreen role={role}/>,
    appropriation: <AppropriationScreen role={role}/>,
    deposits:  <DepositsScreen role={role}/>,
    users:     <Users/>,
    categories:<CategoryManager/>,
    projects:  <ProjectManager/>,
    profile:   <Profile role={role} me={me} staffDept={staffDept}/>,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      {/* SIDEBAR */}
      <aside style={{
        width: t.compact ? 72 : 260, flex:`0 0 ${t.compact?72:260}px`,
        background:'var(--surface)', borderRight:'1px solid var(--line)',
        display:'flex', flexDirection:'column', position:'sticky', top:0, height:'100vh',
        transition:'width .2s'
      }}>
        {/* Logo */}
        <div style={{ padding: t.compact?'20px 16px':'22px 22px', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:36, height:36, borderRadius:10, background:'var(--ink)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <LogoMark size={24}/>
          </div>
          {!t.compact && (
            <div>
              <div className="display" style={{ fontSize:17, fontWeight:700, letterSpacing:'-0.01em' }}>NP Bunchee</div>
              <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:-2 }}>Enterprise · v3.4</div>
            </div>
          )}
        </div>

        {/* Org switcher */}
        {!t.compact && (
          <div style={{ padding:'0 14px 12px' }}>
            <button style={{
              width:'100%', display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
              background:'var(--surface-2)', border:'1px solid var(--line)', borderRadius:12, cursor:'pointer',
              fontFamily:'inherit', textAlign:'left'
            }}>
              <div style={{ width:28, height:28, borderRadius:8, background:'linear-gradient(135deg, #6B4FFF, #2BD4B0)' }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600 }}>กลุ่มบริษัทเอเชีย</div>
                <div style={{ fontSize:11, color:'var(--ink-3)' }}>4 องค์กร</div>
              </div>
              <Icons.arrowRight size={14} style={{ color:'var(--ink-3)', transform:'rotate(90deg)' }}/>
            </button>
          </div>
        )}

        {/* Nav */}
        <nav style={{ padding:'8px 12px', flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:2 }}>
          {navItems.map((n, idx) => {
            const Icon = Icons[n.icon];
            const active = page === n.key;
            const badge = n.badge && n.badge(counts);
            const showHeader = !t.compact && n.group && (idx === 0 || navItems[idx-1].group !== n.group);
            return (
              <React.Fragment key={n.key}>
                {showHeader && (
                  <div style={{ fontSize:11, fontWeight:700, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.08em', padding: idx===0?'10px 12px 6px':'16px 12px 6px' }}>{n.group}</div>
                )}
                <button onClick={()=>setPage(n.key)}
                className={'nav-item' + (active?' active':'')}
                style={{ border:'none', width:'100%', textAlign:'left', fontFamily:'inherit',
                         justifyContent: t.compact?'center':'flex-start' }}
                title={t.compact ? n.label : undefined}
              >
                <Icon size={20} className="nav-icon"/>
                {!t.compact && <>
                  <span style={{ flex:1 }}>{n.label}</span>
                  {badge ? (
                    <span style={{
                      fontSize:11, padding:'2px 7px', borderRadius:999,
                      background: active?'rgba(255,255,255,.2)':'var(--peach)',
                      color: active?'white':'white', fontWeight:700
                    }}>{badge}</span>
                  ) : null}
                </>}
              </button>
              </React.Fragment>
            );
          })}
        </nav>

        {/* Google Sheets status */}
        {!t.compact && (
          <div style={{ padding:14, margin:'8px 14px 14px', background: t.sheetsConnected?'var(--mint-50)':'var(--surface-2)', borderRadius:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              <Icons.sheet size={18} style={{ color: t.sheetsConnected?'#0A7E64':'var(--ink-3)' }}/>
              <div style={{ fontSize:12, fontWeight:700, color: t.sheetsConnected?'#0A7E64':'var(--ink-2)' }}>
                Google Sheets
              </div>
              <span style={{ marginLeft:'auto', width:8, height:8, borderRadius:'50%',
                             background: t.sheetsConnected?'var(--good)':'var(--ink-3)',
                             animation: t.sheetsConnected?'pulseDot 2s infinite':'none' }}/>
            </div>
            <div style={{ fontSize:11, color:'var(--ink-2)', lineHeight:1.5 }}>
              {t.sheetsConnected ? <>เชื่อมต่อ <b>Accounting_2569.xlsx</b><br/>ซิงค์ล่าสุด 2 นาทีที่แล้ว</> : <>ยังไม่ได้เชื่อมต่อ — กดเพื่อเชื่อม</>}
            </div>
            <button className="btn" style={{ height:28, padding:'0 10px', fontSize:11, marginTop:8, background:'white', color:'var(--ink)', borderColor:'transparent', width:'100%', justifyContent:'center' }}>
              <Icons.refresh size={12}/> ซิงค์ทันที
            </button>
          </div>
        )}

        {/* User card */}
        <div style={{ position:'relative', padding: t.compact?'12px':'14px', borderTop:'1px solid var(--line)' }}>
          <button onClick={()=>setUserOpen(!userOpen)} style={{
            width:'100%', display:'flex', alignItems:'center', gap:10, padding:'8px',
            background: userOpen?'var(--surface-2)':'transparent', border:'none', borderRadius:10, cursor:'pointer',
            fontFamily:'inherit', textAlign:'left',
            justifyContent: t.compact?'center':'flex-start'
          }}>
            <Avatar short={me.short} color={r.color} size={36}/>
            {!t.compact && <>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{me.name}</div>
                <div style={{ fontSize:11, color:r.color, fontWeight:600 }}>{r.label}</div>
              </div>
              <Icons.more size={16} style={{ color:'var(--ink-3)' }}/>
            </>}
          </button>
          {userOpen && (
            <div className="fade-up" style={{
              position:'absolute', bottom:'calc(100% - 4px)', left:14, right:14,
              background:'white', borderRadius:14, boxShadow:'var(--shadow-lg)', padding:8, zIndex:30, border:'1px solid var(--line)'
            }}>
              <UserMenuItem icon="user" label="ดูโปรไฟล์" onClick={()=>{setPage('profile'); setUserOpen(false);}}/>
              <UserMenuItem icon="cog" label="การตั้งค่า"/>
              <UserMenuItem icon="shield" label="ความปลอดภัย"/>
              <div style={{ height:1, background:'var(--line)', margin:'6px 0' }}/>
              <UserMenuItem icon="logout" label="ออกจากระบบ" danger onClick={()=>setTweak({showLogin:true})}/>
            </div>
          )}
        </div>
      </aside>

      {/* MAIN */}
      <main style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
        {/* TOPBAR */}
        <header style={{
          position:'sticky', top:0, zIndex:20,
          height:64, background:'rgba(244,241,234,.85)', backdropFilter:'blur(10px)',
          borderBottom:'1px solid var(--line)', padding:'0 28px',
          display:'flex', alignItems:'center', gap:16
        }}>
          {/* Search */}
          <div style={{ position:'relative', flex:1, maxWidth:520 }}>
            <Icons.search size={16} style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', color:'var(--ink-3)' }}/>
            <input className="input" placeholder="ค้นหา เอกสาร ผู้ใช้ บัญชี… (กด ⌘K)"
                   value={search} onChange={e=>setSearch(e.target.value)}
                   style={{ paddingLeft:40, background:'white', border:'1px solid var(--line)' }}/>
            <kbd style={{
              position:'absolute', right:10, top:'50%', transform:'translateY(-50%)',
              fontSize:11, padding:'2px 6px', borderRadius:5, background:'var(--surface-2)',
              color:'var(--ink-3)', border:'1px solid var(--line)', fontFamily:'IBM Plex Mono'
            }}>⌘K</kbd>
          </div>

          <div style={{ flex:1 }}/>

          {/* Quick actions */}
          <button className="btn btn-soft" style={{ height:38 }}><Icons.plus size={16}/> สร้างใหม่</button>

          {/* Date */}
          <div style={{ fontSize:13, color:'var(--ink-2)', display:'flex', alignItems:'center', gap:8 }}>
            <Icons.calendar size={16} style={{ color:'var(--ink-3)' }}/>
            <span>24 พ.ค. 2569 · พุธ</span>
          </div>

          {/* Notif */}
          <div style={{ position:'relative' }}>
            <button onClick={()=>setNotifOpen(!notifOpen)} className="btn btn-soft" style={{ width:38, padding:0, justifyContent:'center', position:'relative' }}>
              <Icons.bell size={18}/>
              <span style={{ position:'absolute', top:6, right:7, width:8, height:8, borderRadius:'50%', background:'var(--peach)', border:'2px solid white' }}/>
            </button>
            {notifOpen && (
              <div className="fade-up" style={{
                position:'absolute', top:'calc(100% + 8px)', right:0, width:360,
                background:'white', borderRadius:14, boxShadow:'var(--shadow-lg)', border:'1px solid var(--line)', zIndex:30, overflow:'hidden'
              }}>
                <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div className="display" style={{ fontSize:15, fontWeight:700 }}>การแจ้งเตือน</div>
                  <a href="#" style={{ fontSize:12, color:'var(--primary)', fontWeight:600 }}>ทำเครื่องหมายว่าอ่านแล้ว</a>
                </div>
                {[
                  {t:'มีใบเบิกใหม่จาก ณัฐพล', s:'EXP-2024-0418 · ฿480', when:'2 นาทีก่อน', c:'#FF8C6B', i:'inbox'},
                  {t:'อนุมัติแล้ว: EXP-2024-0416', s:'โดย ธีรพัฒน์ ศรีสุวรรณ', when:'1 ชม.ก่อน', c:'#2BD4B0', i:'check'},
                  {t:'Google Sheets ซิงค์สำเร็จ', s:'อัพเดต 42 รายการ', when:'2 ชม.ก่อน', c:'#5BB8FF', i:'sheet'},
                  {t:'รอบจ่ายเงินเดือนใกล้ถึง', s:'28 พ.ค. 2569', when:'เมื่อวาน', c:'#6B4FFF', i:'wallet'},
                ].map((n,i)=>{
                  const Icon = Icons[n.i];
                  return (
                    <div key={i} style={{ padding:'12px 18px', display:'flex', gap:12, borderBottom:'1px solid var(--line)', cursor:'pointer' }}>
                      <div style={{ width:36, height:36, borderRadius:10, background:n.c+'1A', color:n.c, display:'flex', alignItems:'center', justifyContent:'center', flex:'0 0 36px' }}>
                        <Icon size={18}/>
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:600 }}>{n.t}</div>
                        <div style={{ fontSize:12, color:'var(--ink-2)' }}>{n.s}</div>
                        <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:2 }}>{n.when}</div>
                      </div>
                    </div>
                  );
                })}
                <div style={{ padding:'12px', textAlign:'center', borderTop:'1px solid var(--line)' }}>
                  <a href="#" style={{ fontSize:13, color:'var(--primary)', fontWeight:600 }}>ดูทั้งหมด</a>
                </div>
              </div>
            )}
          </div>

          {/* Help + role */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:9 }}>
            <button className="btn btn-soft" style={{ width:38, padding:0, justifyContent:'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
            </button>
            <span style={{
              display:'inline-flex', alignItems:'center', gap:5, maxWidth:140,
              fontSize:13, fontWeight:700, color:'var(--ink)', lineHeight:1,
              whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'
            }}>
              <span style={{ width:7, height:7, borderRadius:99, background:r.color, flex:'0 0 7px' }}/>
              {r.label}
            </span>
          </div>
        </header>

        {/* CONTENT */}
        <div style={{ padding:'28px 28px 56px', flex:1 }} key={role + page}>
          <div className="fade-in">{screens[page]}</div>
        </div>
      </main>

      {/* TWEAKS PANEL */}
      <TweaksPanel title="Tweaks">

        {role === 'staff' && (
          <TweakSection label="แผนกของพนักงาน">
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {Object.values(STAFF_DEPTS).map(d => {
                const sel = staffDept === d.key;
                return (
                  <button key={d.key} onClick={()=>setTweak({staffDept: d.key})} style={{
                    display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10,
                    border: sel ? `2px solid ${d.color}` : '1px solid var(--line-2)',
                    background: sel ? d.color+'15' : 'white',
                    cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'
                  }}>
                    <div style={{ width:28, height:28, borderRadius:8, background:d.color, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontFamily:'Sora, sans-serif', fontWeight:700 }}>
                      {d.allowedSections.join(',')}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600 }}>{d.label}</div>
                      <div style={{ fontSize:11, color:'var(--ink-3)' }}>
                        เบิกหมวด {d.allowedSections.join(', ')} เท่านั้น
                      </div>
                    </div>
                    {sel && <div style={{ width:18, height:18, borderRadius:'50%', background:d.color, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11 }}>✓</div>}
                  </button>
                );
              })}
            </div>
          </TweakSection>
        )}

        <TweakSection label="สีหลัก (Accent)">
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {Object.entries(ACCENTS).map(([k, v]) => {
              const sel = t.accentName === k;
              return (
                <button key={k} onClick={()=>setTweak({accentName: k})} title={v.label} style={{
                  width:36, height:36, borderRadius:10, background:v.color,
                  border: sel? '3px solid var(--ink)' : '3px solid transparent',
                  cursor:'pointer', boxShadow:'0 0 0 1px var(--line)'
                }}/>
              );
            })}
          </div>
        </TweakSection>

        <TweakSection label="หน้าจอ">
          <TweakToggle label="ไซด์บาร์แบบยุบ (Compact)" value={t.compact} onChange={v=>setTweak({compact: v})}/>
          <TweakToggle label="เชื่อมต่อ Google Sheets" value={t.sheetsConnected} onChange={v=>setTweak({sheetsConnected: v})}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const UserMenuItem = ({ icon, label, danger, onClick }) => {
  const Icon = Icons[icon];
  return (
    <button onClick={onClick} style={{
      width:'100%', display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
      background:'transparent', border:'none', borderRadius:8, cursor:'pointer',
      fontFamily:'inherit', textAlign:'left', fontSize:13, fontWeight:500,
      color: danger? 'var(--bad)' : 'var(--ink)'
    }}
    onMouseEnter={e=>e.currentTarget.style.background='var(--surface-2)'}
    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      <Icon size={16}/> {label}
    </button>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
