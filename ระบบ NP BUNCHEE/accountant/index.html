<style>
  :root{
    --bg: #F4F1EA;
    --surface: #FFFFFF;
    --surface-2: #FBF8F2;
    --ink: #1A1B3A;
    --ink-2: #5A5C7A;
    --ink-3: #9295B0;
    --line: #ECE7DD;
    --line-2: #E3DCCD;

    --primary: #6B4FFF;
    --primary-ink: #FFFFFF;
    --primary-50: #F0ECFF;
    --primary-100: #DBD0FF;
    --mint: #2BD4B0;
    --mint-50: #DFFBF3;
    --peach: #FF8C6B;
    --peach-50: #FFE6DD;
    --sun: #FFCB47;
    --sun-50: #FFF3D1;
    --rose: #FF5C8A;
    --rose-50: #FFE2EA;
    --sky: #5BB8FF;
    --sky-50: #E2F1FF;

    --good: #16A981;
    --warn: #E89A12;
    --bad:  #E54B6B;

    --r-lg: 22px;
    --r-md: 14px;
    --r-sm: 10px;

    --shadow-sm: 0 1px 0 rgba(26,27,58,.04), 0 2px 6px rgba(26,27,58,.04);
    --shadow-md: 0 1px 0 rgba(26,27,58,.04), 0 10px 28px -10px rgba(26,27,58,.18);
    --shadow-lg: 0 30px 60px -30px rgba(26,27,58,.30), 0 6px 18px rgba(26,27,58,.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1;
  }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: "tnum" 1; }
  .display { font-family: 'Sora', 'IBM Plex Sans Thai', sans-serif; letter-spacing: -0.01em; }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d8d2c4; border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #c4bdac; }

  /* Layout shell */
  #root { min-height: 100vh; }

  /* Animation helpers */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .fade-up { animation: fadeUp .35s cubic-bezier(.2,.7,.2,1) both; }
  .fade-in { animation: fadeIn .25s both; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 16px;
         border-radius: 12px; font-weight: 600; font-size: 14px; border: 1px solid transparent;
         cursor: pointer; transition: transform .08s ease, background .15s, box-shadow .15s;
         font-family: inherit; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #2a2c52; }
  .btn-accent { background: var(--primary); color: white; box-shadow: 0 6px 16px -8px rgba(107,79,255,.6); }
  .btn-accent:hover { background: #5a3fef; }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }
  .btn-ghost:hover { background: var(--surface); }
  .btn-soft { background: var(--surface); color: var(--ink); border-color: var(--line); }
  .btn-soft:hover { background: var(--surface-2); }

  /* Inputs */
  .input {
    height: 40px; border-radius: 12px; border: 1px solid var(--line-2);
    padding: 0 14px; background: var(--surface); font-family: inherit; font-size: 14px;
    color: var(--ink); width: 100%;
  }
  .input:focus { outline: 2px solid var(--primary-100); border-color: var(--primary); }
  textarea.input { height: auto; padding: 12px 14px; }

  /* Card */
  .card { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--line);
          box-shadow: var(--shadow-sm); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 10px;
           border-radius: 999px; font-size: 12px; font-weight: 600; }

  /* Sidebar item */
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px;
              border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--ink-2);

  .nav-icon { width: 20px; height: 20px; flex: 0 0 20px; color: var(--ink-3); }

  .tbl th { text-align: left; font-size: 12px; font-weight: 600; color: var(--ink-3);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <button onClick={() => setOpen(true)} aria-label="Open tweaks"
        style={{
          position:'fixed', right:16, bottom:16, zIndex:2147483646,
          width:48, height:48, borderRadius:999, border:'none', cursor:'pointer',
          background:'#1A1B3A', color:'white', boxShadow:'0 10px 24px -8px rgba(26,27,58,.5)',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:20,
          transform:'scale(var(--dc-inv-zoom,1))', transformOrigin:'bottom right'
        }}>
        ⚙
      </button>
    </>
  );
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-presets="react,env">
// Shared UI components

const Avatar = ({ name, short, size=36, color, ring }) => {
  const palette = ['#6B4FFF','#2BD4B0','#FF8C6B','#FFCB47','#5BB8FF','#FF5C8A'];
  const idx = (short || name || '?').charCodeAt(0) % palette.length;
  const bg = color || palette[idx];
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', background:bg, color:'white',
      display:'flex', alignItems:'center', justifyContent:'center',
      fontWeight:700, fontSize: size*0.38, flex:`0 0 ${size}px`,
      fontFamily:'Sora, sans-serif', letterSpacing:'-0.02em',
      boxShadow: ring ? `0 0 0 3px ${ring}` : 'none'
    }}>
      {(short || (name||'?').slice(0,2))}
    </div>
  );
};

const Badge = ({ kind='draft', children, dot=true }) => {
  const s = STATUS_TH[kind] || STATUS_TH.draft;
  return (
    <span className="badge" style={{ background: s.bg, color: s.fg }}>
      {dot && <span style={{ width:6, height:6, borderRadius:'50%', background:s.dot }}/>}
      {children || s.label}
    </span>
  );
};

const CategoryChip = ({ name }) => {
  // New: name is a code like "1.1" → look up in CATEGORY_INDEX
  const entry = CATEGORY_INDEX[name];
  if (entry) {
    return (
      <span className="badge" style={{ background: entry.section.color+'1F', color: entry.section.color }}
            title={entry.label}>
        <span className="mono" style={{ fontWeight:700, fontSize:11, opacity:.8 }}>{entry.code}</span>
        <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:200 }}>{entry.label.replace(/^Admin\s/, '').replace(/^การตลาด\s/, '')}</span>
      </span>
    );
  }
  // Fallback: legacy text categories
  const c = (CATEGORY_COLOR && CATEGORY_COLOR[name]) || { bg:'#EFEDE6', fg:'#5A5C7A' };
  return <span className="badge" style={{ background: c.bg, color: c.fg }}>{name}</span>;
};

// Stat card with optional sparkline
const StatCard = ({ label, value, sub, delta, accent='var(--primary)', icon, spark, big }) => {
  const Icon = icon ? Icons[icon] : null;
  return (
    <div className="card fade-up" style={{ padding: '20px 22px', position:'relative', overflow:'hidden' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom: 14 }}>
        <div style={{ fontSize:13, color:'var(--ink-2)', fontWeight:500 }}>{label}</div>
        {Icon && (
          <div style={{
            width:34, height:34, borderRadius:10, background:`${accent}1A`,
            color: accent, display:'flex', alignItems:'center', justifyContent:'center'
          }}>
            <Icon size={18} sw={2}/>
          </div>
        )}
      </div>
      <div className="display" style={{ fontSize: big? 36 : 28, fontWeight:700, letterSpacing:'-0.02em' }}>
        {value}
      </div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8 }}>
        <div style={{ fontSize:12, color:'var(--ink-3)' }}>{sub}</div>
        {typeof delta === 'number' && (
          <span style={{
            display:'inline-flex', alignItems:'center', gap:3, fontSize:12, fontWeight:600,
            color: delta>=0 ? 'var(--good)' : 'var(--bad)'
          }}>
            {delta>=0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)}%
          </span>
        )}
      </div>
      {spark && <Sparkline data={spark} color={accent} style={{ marginTop:10 }}/>}
    </div>
  );
};

// Inline sparkline
const Sparkline = ({ data=[3,5,4,6,5,8,7,9,8,11,10,12], color='var(--primary)', w=200, h=44, style }) => {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i/(data.length-1)) * w;
    const y = h - ((v - min)/range) * (h - 6) - 3;
    return [x, y];
  });
  const d = pts.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = d + ` L ${w},${h} L 0,${h} Z`;
  const gradId = 'sg-' + Math.random().toString(36).slice(2,8);
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={style}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gradId})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
    </svg>
  );
};

// Donut chart
const Donut = ({ slices, size=160, thickness=22, center }) => {
  const total = slices.reduce((s,x)=>s+x.value, 0);
  const r = (size - thickness)/2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <div style={{ position:'relative', width:size, height:size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F1ECDF" strokeWidth={thickness}/>
        {slices.map((s,i) => {
          const len = (s.value/total) * c;
          const dash = `${len} ${c - len}`;
          const el = (
            <circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
                    stroke={s.color} strokeWidth={thickness}
                    strokeDasharray={dash} strokeDashoffset={-offset} strokeLinecap="butt"/>
          );
          offset += len;
          return el;
        })}
      </svg>
      {center && (
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
                      alignItems:'center', justifyContent:'center', textAlign:'center' }}>
          {center}
        </div>
      )}
    </div>
  );
};

// Bar chart
const BarChart = ({ data, height=180, color='var(--primary)', color2='var(--mint)', dual=false }) => {
  const max = Math.max(...data.flatMap(d => dual ? [d.a, d.b] : [d.v]));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:14, height, padding:'8px 0' }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
          <div style={{ flex:1, width:'100%', display:'flex', gap:4, alignItems:'flex-end', justifyContent:'center' }}>
            {dual ? (
              <>
                <div style={{ width:'40%', height: `${(d.a/max)*100}%`, background:color, borderRadius:'6px 6px 0 0', minHeight:4 }}/>
                <div style={{ width:'40%', height: `${(d.b/max)*100}%`, background:color2, borderRadius:'6px 6px 0 0', minHeight:4 }}/>
              </>
            ) : (
              <div style={{ width:'70%', height: `${(d.v/max)*100}%`, background:color, borderRadius:'6px 6px 0 0', minHeight:4 }}/>
            )}
          </div>
          <div style={{ fontSize:11, color:'var(--ink-3)', fontWeight:500 }}>{d.label}</div>
        </div>
      ))}
    </div>
  );
};

// Section header
const SectionHead = ({ title, sub, right }) => (
  <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:16, gap:16 }}>
    <div>
      <div className="display" style={{ fontSize:18, fontWeight:700 }}>{title}</div>
      {sub && <div style={{ fontSize:13, color:'var(--ink-2)', marginTop:2 }}>{sub}</div>}
    </div>
    {right}
  </div>
);

// Empty state
const Empty = ({ title, sub, icon='inbox' }) => {
  const Icon = Icons[icon];
  return (
    <div style={{ padding:'48px 24px', textAlign:'center' }}>
      <div style={{ width:56, height:56, borderRadius:16, background:'var(--surface-2)',
                    margin:'0 auto 16px', display:'flex', alignItems:'center', justifyContent:'center',
                    color:'var(--ink-3)' }}>
        <Icon size={24}/>
      </div>
      <div className="display" style={{ fontSize:15, fontWeight:600 }}>{title}</div>
      <div style={{ fontSize:13, color:'var(--ink-3)', marginTop:4 }}>{sub}</div>
    </div>
  );
};

// Page wrapper with breadcrumb
const PageHeader = ({ title, sub, actions, crumbs }) => (
  <div style={{ marginBottom:24 }}>
    {crumbs && (
      <div style={{ fontSize:12, color:'var(--ink-3)', marginBottom:8, display:'flex', gap:6, alignItems:'center' }}>
        {crumbs.map((c,i)=>(
          <React.Fragment key={i}>
            {i>0 && <span>›</span>}
            <span style={{ color: i===crumbs.length-1 ? 'var(--ink-2)' : 'var(--ink-3)' }}>{c}</span>
          </React.Fragment>
        ))}
      </div>
    )}
    <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:24, flexWrap:'wrap' }}>
      <div>
        <h1 className="display" style={{ fontSize:30, fontWeight:700, margin:0, letterSpacing:'-0.02em' }}>{title}</h1>
        {sub && <div style={{ fontSize:14, color:'var(--ink-2)', marginTop:6 }}>{sub}</div>}
      </div>
      {actions && <div style={{ display:'flex', gap:10 }}>{actions}</div>}
    </div>
  </div>
);

// Toast notification (inline)
const Toast = ({ kind='good', text, onClose }) => {
  const colors = {
    good: { bg:'#0A7E64', dot:'#7BF1CE' },
    info: { bg:'#1F4EA0', dot:'#A6D2FF' },
    warn: { bg:'#9C7100', dot:'#FFE07F' },
  };
  const c = colors[kind];
  return (
    <div className="fade-up" style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)',
      background:c.bg, color:'white', padding:'12px 18px', borderRadius:14,
      boxShadow:'var(--shadow-lg)', display:'flex', alignItems:'center', gap:12, zIndex:1000,
      fontSize:14, fontWeight:500
    }}>
      <span style={{ width:8, height:8, borderRadius:'50%', background:c.dot }}/>
      {text}
      {onClose && <span onClick={onClose} style={{ cursor:'pointer', opacity:.7, marginLeft:8 }}>✕</span>}
    </div>
  );
};

Object.assign(window, {
  Avatar, Badge, CategoryChip, StatCard, Sparkline, Donut, BarChart,
  SectionHead, Empty, PageHeader, Toast,
});

</script>
<script type="text/babel" data-presets="react,env">
// Sample data & helpers

const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// Budget-month helpers (current Buddhist-era month + N months back)
function budgetMonthOptions(count = 4) {
  // demo "current" = พ.ค. 2569 (index 4, year 2569)
  const baseMonth = 4, baseYear = 2569;
  const opts = [];
  for (let i = 0; i < count; i++) {
    let m = baseMonth - i, y = baseYear;
    while (m < 0) { m += 12; y -= 1; }
    opts.push({ key: `${y}-${String(m+1).padStart(2,'0')}`, label: `${THAI_MONTHS[m]} ${y}`, month: m, year: y });
  }
  return opts;
}
const CURRENT_BUDGET_MONTH = budgetMonthOptions()[0].key;
// current date-time string (demo "now")
function nowDateTimeTH() {
  return '29/05/2569 14:32';
}

const fmtTHB = (n, opts={}) => {
  const { sign=false, compact=false } = opts;
  if (compact) {
    if (Math.abs(n) >= 1_000_000) return (sign && n>0 ? '+' : '') + '฿' + (n/1_000_000).toLocaleString('th-TH', { maximumFractionDigits: 2 }) + 'M';
    if (Math.abs(n) >= 1_000) return (sign && n>0 ? '+' : '') + '฿' + (n/1_000).toLocaleString('th-TH', { maximumFractionDigits: 1 }) + 'K';
  }
  const s = n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (sign && n>0 ? '+' : (n<0 ? '-' : '')) + '฿' + s.replace('-', '');
};

const fmtPct = (n) => (n>0?'+':'') + n.toFixed(1) + '%';

// แสดงเฉพาะชื่อต้น (ตัดนามสกุล) — ใช้ทั่วระบบ ยกเว้นหน้าโปรไฟล์

  accountant: { key: 'accountant', label: 'พนักงานบัญชี',    labelEn: 'Accountant', color: '#2BD4B0', icon: 'book' },
  finance:    { key: 'finance',    label: 'ฝ่ายการเงิน',        labelEn: 'Finance',    color: '#FF5C8A', icon: 'wallet' },

  executive:  { key: 'executive',  label: 'ผู้บริหาร',          labelEn: 'Executive',  color: '#6B4FFF', icon: 'trending' },
  admin:      { key: 'admin',      label: 'ผู้ดูแลระบบ',       labelEn: 'Admin',      color: '#FFCB47', icon: 'shield' },

// Build index for fast lookup by code
const CATEGORY_INDEX = (() => {
  const map = {};
  EXPENSE_GROUPS.forEach(g => g.sections.forEach(s => s.items.forEach(it => {
    map[it.code] = { code:it.code, label:it.label, group:g, section:s, acctType:it.acctType || 'expense', restricted: !!(g.restricted || s.restricted) };
  })));
  return map;
})();

const categoryAllowed = (code, role) => {
  const c = CATEGORY_INDEX[code];
  if (!c || !c.restricted) return true;
  const roles = c.group.roles || ['manager','executive'];
  return roles.includes(role);
};

// Helper: return allowed section codes for a (role, staffDept)
function getAllowedSections(role, staffDept) {
  if (role === 'staff') {
    const d = STAFF_DEPTS[staffDept] || STAFF_DEPTS.marketing;
    return d.allowedSections;
  }
  if (role === 'finance') return ['4'];
  if (role === 'manager' || role === 'executive') return ['1','2','3','4','5','6'];
  return ['1','2','3','4','5'];
}

function getAllowedItems(role, staffDept) {
  // null = unrestricted (show all items in allowed sections)
  if (role === 'finance') return ['4.3', '4.4'];
  if (role === 'staff') {
    const d = STAFF_DEPTS[staffDept];
    if (d && d.allowedItems) return d.allowedItems;
  }
  return null;
}

function getAllowedGroups(role, staffDept) {
  if (role === 'staff') {
    const d = STAFF_DEPTS[staffDept];
    // ถ้ามีสิทธิ์หมวด 5 → เข้าถึงกลุ่ม B ได้
    if (d && d.allowedSections && d.allowedSections.includes('5')) return ['A','B'];
    return ['A'];
  }
  if (role === 'finance') return ['A'];
  if (role === 'manager' || role === 'executive') return ['A','B','C'];
  return ['A','B'];
}

// Multi-select filter dropdown (checkbox list)
const MultiFilter = ({ label, icon, options, selected, onToggle, onClear }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const Icon = Icons[icon] || Icons.filter;
  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  const count = selected.size;
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button className="btn btn-soft" onClick={()=>setOpen(!open)}
        style={{ whiteSpace:'nowrap', flex:'0 0 auto', borderColor: count>0 ? 'var(--primary)' : 'var(--line-2)', background: count>0 ? 'var(--primary-50)' : 'white', color: count>0 ? 'var(--primary)' : 'var(--ink)' }}>
        <Icon size={16}/> {label}
        {count>0 && <span style={{ marginLeft:2, fontSize:11, padding:'1px 7px', borderRadius:999, background:'var(--primary)', color:'white', fontWeight:700 }}>{count}</span>}
        <Icons.arrowDown size={13} style={{ marginLeft:2, transform: open?'rotate(180deg)':'none', transition:'transform .15s' }}/>
      </button>
      {open && (
        <div className="fade-up" style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:50, width:300,
          background:'white', borderRadius:14, border:'1px solid var(--line)', boxShadow:'var(--shadow-lg)',
          maxHeight:360, display:'flex', flexDirection:'column'
        }}>
          <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:13, fontWeight:700 }}>เลือก{label} ({count})</span>
            <button onClick={onClear} style={{ background:'transparent', border:'none', cursor:'pointer', fontSize:12, color:'var(--primary)', fontWeight:600 }}>ล้าง</button>
          </div>
          <div style={{ overflowY:'auto', flex:1, padding:6 }}>
            {options.map(o => {
              const sel = selected.has(o.value);
              return (
                <label key={o.value} style={{
                  display:'flex', alignItems:'center', gap:10, padding:'8px 10px', borderRadius:8, cursor:'pointer',
                  background: sel ? 'var(--primary-50)' : 'transparent', fontSize:13
                }}
                onMouseEnter={e=>{ if(!sel) e.currentTarget.style.background='var(--surface-2)'; }}
                onMouseLeave={e=>{ if(!sel) e.currentTarget.style.background='transparent'; }}>
                  <input type="checkbox" checked={sel} onChange={()=>onToggle(o.value)} style={{ accentColor:'var(--primary)' }}/>
                  <span style={{ color: sel?'var(--primary)':'var(--ink)', fontWeight: sel?600:400 }}>{o.label}</span>
                </label>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// Date-range filter (ปฏิทิน from–to)
const DateRangeFilter = ({ label, icon, range, onFrom, onTo, onClear }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const Icon = Icons[icon] || Icons.calendar;
  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  const active = !!(range.from || range.to);
  const fmtShort = (iso) => iso ? iso.split('-').reverse().join('/') : '—';
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button className="btn btn-soft" onClick={()=>setOpen(!open)}
        style={{ whiteSpace:'nowrap', flex:'0 0 auto', borderColor: active ? 'var(--primary)' : 'var(--line-2)', background: active ? 'var(--primary-50)' : 'white', color: active ? 'var(--primary)' : 'var(--ink)' }}>
        <Icon size={16}/> {label}
        {active && <span style={{ marginLeft:2, fontSize:11, padding:'1px 7px', borderRadius:999, background:'var(--primary)', color:'white', fontWeight:700 }}>{fmtShort(range.from)}–{fmtShort(range.to)}</span>}
        <Icons.arrowDown size={13} style={{ marginLeft:2, transform: open?'rotate(180deg)':'none', transition:'transform .15s' }}/>
      </button>
      {open && (
        <div className="fade-up" style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:50, width:280,
          background:'white', borderRadius:14, border:'1px solid var(--line)', boxShadow:'var(--shadow-lg)', padding:14
        }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <span style={{ fontSize:13, fontWeight:700 }}>เลือกช่วง{label}</span>
            <button onClick={onClear} style={{ background:'transparent', border:'none', cursor:'pointer', fontSize:12, color:'var(--primary)', fontWeight:600 }}>ล้าง</button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div>
              <label style={{ fontSize:12, fontWeight:600, color:'var(--ink-2)', display:'block', marginBottom:4 }}>ตั้งแต่วันที่</label>
              <input className="input mono" type="date" value={range.from || ''} max={range.to || undefined} onChange={e=>onFrom(e.target.value)} style={{ height:38, fontSize:13 }}/>
            </div>
            <div>
              <label style={{ fontSize:12, fontWeight:600, color:'var(--ink-2)', display:'block', marginBottom:4 }}>ถึงวันที่</label>
              <input className="input mono" type="date" value={range.to || ''} min={range.from || undefined} onChange={e=>onTo(e.target.value)} style={{ height:38, fontSize:13 }}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

    {k:'all', l:'ทั้งหมด', n: CLAIMS.length},
    {k:'pending', l:'รออนุมัติ', n: CLAIMS.filter(c=>c.status==='pending').length},
    {k:'approved', l:'อนุมัติแล้ว', n: CLAIMS.filter(c=>c.status==='approved').length},
    {k:'topay', l:'รอจ่าย', n: CLAIMS.filter(c=>c.status==='topay').length},
    {k:'paid', l:'จ่ายแล้ว', n: CLAIMS.filter(c=>c.status==='paid').length},
    {k:'rejected', l:'ถูกปฏิเสธ', n: CLAIMS.filter(c=>c.status==='rejected').length},
    {k:'draft', l:'ฉบับร่าง', n: CLAIMS.filter(c=>c.status==='draft').length},
  ];

  let rows = tab==='all' ? claims : claims.filter(c => c.status===tab);
  if (role==='staff') rows = rows.filter(c => c.who === ME.staff.name || c.whoShort === ME.staff.short);
  if (role==='finance') rows = rows.filter(c => c.payMethod === 'cash'); // ฝ่ายการเงินเห็นเฉพาะบัญชีจ่ายเงินสดย่อย
  if (search) rows = rows.filter(c => (c.id + c.desc + c.who).toLowerCase().includes(search.toLowerCase()));

  // Per-column filters
  const cbName = (id) => {
    const b = COMPANY_BANKS.find(x => x.id === id);
    if (!b) return '';
    return BANKS.find(x=>x.code===b.bank)?.short + ' ' + b.acno + ' ' + b.label;
  };
  const payeeName = (id) => {
    const a = SAVED_ACCOUNTS.find(x => x.id === id);

    return (a.kind==='bank' ? BANKS.find(x=>x.code===a.bank)?.short : 'PromptPay') + ' ' + a.acno + ' ' + a.name;
  };
  const projName = (code) => {

    if (fl.desc && !c.desc.toLowerCase().includes(fl.desc.toLowerCase())) return false;
    if (fl.project && !projName(c.projectCode).toLowerCase().includes(fl.project.toLowerCase())) return false;
    if (fl.companyBank && !cbName(c.companyBankId).toLowerCase().includes(fl.companyBank.toLowerCase())) return false;
    if (fl.payee && !payeeName(c.payeeAccountId).toLowerCase().includes(fl.payee.toLowerCase())) return false;
    if (fl.status && !(STATUS_TH[c.status]?.label || c.status).toLowerCase().includes(fl.status.toLowerCase())) return false;
    if (fl.budget) {

    if (catFilter.size > 0 && !catFilter.has(c.category)) return false;
    if (projFilter.size > 0 && !projFilter.has(c.projectCode)) return false;
    if (dateFilter.size > 0 && !dateFilter.has(c.date)) return false;
    if (budgetFilter.size > 0 && !budgetFilter.has(c.budgetMonth)) return false;
    if (whoFilter.size > 0 && !whoFilter.has(c.who)) return false;

    if (payAcctFilter.size > 0) {
      const pa = c.payMethod === 'cash' ? 'cash' : c.companyBankId;
      if (!payAcctFilter.has(pa)) return false;
    }
    return true;
  });

        title="รายจ่าย / ใบเสร็จ"

        crumbs={['หน้าหลัก','รายจ่าย']}
        actions={<>
          <button className="btn btn-soft"><Icons.upload size={16}/> นำเข้า</button>
          <button className="btn btn-soft"><Icons.download size={16}/> ส่งออก</button>
          <button className="btn btn-accent" onClick={()=>go && go('expense')}><Icons.plus size={16}/> สร้างใบใหม่</button>
        </>}
      />

      <div className="card" style={{ padding:0, overflow:'hidden' }}>
        {/* Tabs */}
        <div style={{ display:'flex', gap:4, padding:'10px 14px 0', borderBottom:'1px solid var(--line)' }}>
          {tabs.map(t => (
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              padding:'10px 14px', border:'none', background:'transparent', cursor:'pointer',
              fontSize:14, fontWeight:600, color: tab===t.k ? 'var(--ink)' : 'var(--ink-3)',
              borderBottom: tab===t.k ? '2px solid var(--primary)' : '2px solid transparent',
              fontFamily:'inherit', display:'flex', alignItems:'center', gap:8
            }}>
              {t.l}
              <span style={{
                fontSize:11, padding:'2px 7px', borderRadius:999,
                background: tab===t.k ? 'var(--primary-50)' : 'var(--surface-2)',
                color: tab===t.k ? 'var(--primary)' : 'var(--ink-3)'
              }}>{t.n}</span>
            </button>
          ))}
        </div>

        {/* Toolbar */}
        <div style={{ display:'flex', gap:10, padding:14, borderBottom:'1px solid var(--line)', background:'var(--surface-2)', flexWrap:'wrap', alignItems:'center' }}>

                <th>งบเดือน</th>
                <th>ผู้ขอ</th>
                <th>หมวด</th>
                <th>รายละเอียด</th>
                <th>โครงการ</th>
                <th>บัญชีจ่ายบริษัท</th>
                <th>บัญชีผู้รับ</th>
                <th>แนบ</th>
                <th style={{ textAlign:'right' }}>จำนวน</th>
                <th>สถานะ</th>
                <th>หมายเหตุ</th>
                <th></th>

                <th style={{ padding:6, borderBottom:'1px solid var(--line)' }}><ColFilter value={fl.who} onChange={v=>setF('who',v)} ph="ชื่อ"/></th>
                <th style={{ padding:6, borderBottom:'1px solid var(--line)' }}><ColFilter value={fl.category} onChange={v=>setF('category',v)} ph="1.1 / แอด"/></th>
                <th style={{ padding:6, borderBottom:'1px solid var(--line)' }}><ColFilter value={fl.desc} onChange={v=>setF('desc',v)} ph="ค้นหา"/></th>

                    <tr key={c.id} style={{ background:'var(--primary-50)' }}>

                        <EditRow draft={editDraft} setD={setD} onSave={saveEdit} onCancel={cancelEdit}/>
                      </td>
                    </tr>
                  );
                }
                return (
                <tr key={c.id} onClick={()=>setSelected(c)} style={{ cursor:'pointer' }}>
                  <td><input type="checkbox" onClick={e=>e.stopPropagation()}/></td>
                  <td className="mono" style={{ color:'var(--primary)', fontWeight:600 }}>{c.id}</td>
                  <td>{c.date}</td>
                  <td onClick={e=>e.stopPropagation()}>

                  <td><Badge kind={c.status}/></td>
                  <td onClick={e=>e.stopPropagation()} style={{ maxWidth:160 }}>
                    {editingNote === c.id ? (
                      <input autoFocus value={noteMap[c.id] || ''} onChange={e=>setNoteMap({...noteMap, [c.id]: e.target.value})}
                        onBlur={()=>setEditingNote(null)} onKeyDown={e=>{ if(e.key==='Enter') setEditingNote(null); }}
                        placeholder="พิมพ์หมายเหตุ…"
                        style={{ width:150, height:28, padding:'0 6px', borderRadius:6, border:'1px solid var(--primary)', fontFamily:'inherit', fontSize:12 }}/>
                    ) : noteMap[c.id] ? (
                      <span onClick={()=> canNote && setEditingNote(c.id)} title={canNote?'คลิกเพื่อแก้ไข':''}
                        style={{ fontSize:12, color:'var(--ink-2)', cursor: canNote?'pointer':'default', display:'inline-flex', alignItems:'center', gap:4, maxWidth:150, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        📝 {noteMap[c.id]}
                      </span>
                    ) : canNote ? (
                      <button onClick={()=>setEditingNote(c.id)} style={{ background:'transparent', border:'1px dashed var(--line-2)', borderRadius:6, padding:'3px 8px', fontSize:11, color:'var(--ink-3)', cursor:'pointer', fontFamily:'inherit' }}>+ โน้ต</button>
                    ) : <span style={{ color:'var(--ink-3)' }}>—</span>}
                  </td>
                  <td onClick={e=>e.stopPropagation()}>
                    {canEdit ? (
                      <button onClick={()=>startEdit(c)} className="btn btn-soft" style={{ height:28, padding:'0 10px', fontSize:11 }}>✏️ แก้ไข</button>
                    ) : (
                      <button style={{ background:'transparent', border:'none', cursor:'pointer', color:'var(--ink-3)' }}><Icons.more size={18}/></button>

                  </td>

            </tbody>
            {rows.length > 0 && (
              <tfoot>
                <tr style={{ background:'var(--ink)', color:'white' }}>
                  <td colSpan="11" style={{ padding:'14px 18px', fontSize:13, fontWeight:700 }}>
                    รวม {rows.length} รายการ{hasAnyFilter ? ' (หลังกรอง)' : ''}
                  </td>
                  <td className="mono" style={{ textAlign:'right', padding:'14px 18px', fontSize:16, fontWeight:700, color:'#7BF1CE' }}>
                    {fmtTHB(filteredTotal)}
                  </td>
                  <td colSpan="3" style={{ padding:'14px 18px', fontSize:12, opacity:.7, textAlign:'right' }}>
                    รวมตามการ filter ปัจจุบัน
                  </td>
                </tr>
              </tfoot>
            )}
          </table>
          </div>
        )}

        {/* Footer summary */}
        <div style={{ padding:'12px 18px', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13, color:'var(--ink-2)', borderTop:'1px solid var(--line)' }}>
          <span>แสดง {rows.length} จาก {CLAIMS.length} รายการ{hasAnyFilter && <> · <span style={{ color:'var(--primary)', fontWeight:600 }}>มี filter ตามคอลัมน์</span></>}</span>
          <div style={{ display:'flex', gap:6 }}>
            <button className="btn btn-soft" style={{ height:30 }}>‹ ก่อนหน้า</button>
            <button className="btn btn-soft" style={{ height:30 }}>ถัดไป ›</button>
          </div>
        </div>
      </div>

      {selected && <DocDrawer c={selected} onClose={()=>setSelected(null)} role={role}
        onAction={(action, c) => {
          if (action === 'verify') alert('ตรวจสอบและบันทึก "' + c.id + '" เรียบร้อย ✓');
          if (action === 'directPay') alert('อนุมัติและจ่ายเงินจากบัญชีบริษัทเรียบร้อย "' + c.id + '" ✓');
          setSelected(null);
        }}/>}
      {toast && <Toast text={toast}/>}
    </div>
  );
};

const DocDrawer = ({ c, onClose, onAction, role='manager' }) => {
  const verified = c.verified;
  const canVerify = role === 'accountant' && !verified;
  const canDirectPay = role === 'accountant' && verified && c.payMethod === 'company_bank' && (c.status === 'pending' || c.status === 'topay');
  return (
  <div onClick={onClose} style={{
    position:'fixed', inset:0, background:'rgba(26,27,58,.35)', zIndex:50, display:'flex', justifyContent:'flex-end'
  }}>
    <div onClick={e=>e.stopPropagation()} className="fade-up" style={{
      width:480, height:'100%', background:'white', boxShadow:'var(--shadow-lg)',
      padding:'24px 28px', overflowY:'auto'
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <Badge kind={c.status}/>
        <button onClick={onClose} style={{ background:'transparent', border:'none', cursor:'pointer', fontSize:18, color:'var(--ink-3)' }}>✕</button>
      </div>
      <div className="mono" style={{ fontSize:13, color:'var(--ink-3)' }}>{c.id}</div>
      <div className="display" style={{ fontSize:24, fontWeight:700, marginTop:4, marginBottom:6, letterSpacing:'-0.01em' }}>{c.desc}</div>
      <div style={{ fontSize:14, color:'var(--ink-2)' }}>{c.date} · {c.dept}{c.budgetMonth ? ' · งบ ' + (budgetMonthOptions(4).find(o=>o.key===c.budgetMonth)?.label || c.budgetMonth) : ''}</div>

      <div className="display" style={{ fontSize:42, fontWeight:700, margin:'24px 0 8px', letterSpacing:'-0.02em' }}>
        {fmtTHB(c.amount)}
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:24, flexWrap:'wrap' }}>
        <CategoryChip name={c.category}/>
        {c.projectCode && <ProjectCell code={c.projectCode}/>}
        {c.payMethod === 'company_bank'
          ? <span className="badge" style={{ background:'var(--mint-50)', color:'#0A7E64' }}>🏦 จ่ายผ่านบัญชีบริษัท</span>
          : <span className="badge" style={{ background:'var(--sun-50)', color:'#9C7100' }}>💵 จ่ายเงินสด</span>
        }
        <span className="badge" style={{ background:'var(--surface-2)', color:'var(--ink-2)' }}>📎 {c.attach} ไฟล์แนบ</span>
      </div>

      {/* Verify panel — visible to accountant */}
      {(role === 'accountant') && (
        <div style={{
          padding:14, marginBottom:20, borderRadius:12,
          background: verified ? 'var(--mint-50)' : 'var(--sun-50)',
          border:'1px solid ' + (verified ? '#A8E5D2' : '#F5D78C')
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{
              width:34, height:34, borderRadius:9,
              background: verified ? 'var(--good)' : 'white',
              color: verified ? 'white' : 'var(--warn)',
              display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              <Icons.check size={18}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:700, color: verified ? '#0A6E4E' : '#9C5C2A' }}>
                {verified ? 'ตรวจสอบแล้ว' : 'รอตรวจสอบ'}
              </div>
              <div style={{ fontSize:11, color:'var(--ink-2)' }}>
                {verified
                  ? <>โดย <b>{c.verifiedBy}</b> · {c.verifiedAt}</>
                  : 'ตรวจเอกสาร ยอดเงิน และไฟล์แนบก่อนอนุมัติ'}
              </div>
            </div>
            {canVerify && (
              <button onClick={()=>onAction && onAction('verify', c)} className="btn" style={{ background:'var(--good)', color:'white', height:34 }}>
                <Icons.check size={14}/> ติ๊กตรวจสอบแล้ว
              </button>
            )}
          </div>
        </div>
      )}

      {c.reason && (
        <div style={{ padding:14, background:'var(--rose-50)', borderRadius:12, marginBottom:20 }}>
          <div style={{ fontSize:12, fontWeight:600, color:'#A4254B', marginBottom:4 }}>เหตุผลปฏิเสธ</div>
          <div style={{ fontSize:13, color:'#7A1933' }}>{c.reason}</div>
        </div>
      )}

      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>ผู้ขอ</div>
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:12, background:'var(--surface-2)', borderRadius:12 }}>
          <Avatar short={c.whoShort} size={40}/>
          <div>
            <div style={{ fontWeight:600 }}>{firstName(c.who)}</div>
            <div style={{ fontSize:12, color:'var(--ink-3)' }}>{c.dept}</div>
          </div>
        </div>
      </div>

      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>เส้นทางการอนุมัติ</div>
        <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
          {(() => {
            const past = ['approved','topay','paid','rejected'].includes(c.status);
            const accDone = ['topay','paid'].includes(c.status);
            const finDone = c.status === 'paid';
            return [
              {who:'ผู้ขอ', s:c.who, st:'done', t:'24 พ.ค. 14:02', c:'#5BB8FF'},
              {who:'ผู้จัดการแผนก', s:'ธีรพัฒน์ ศรีสุวรรณ',
                 st: past ? 'done' : c.status==='pending' ? 'now' : 'wait',
                 t:  past ? '24 พ.ค. 14:38' : 'รออยู่', c:'#FF8C6B'},
              {who:'ฝ่ายบัญชี', s:'ปิยะวรรณ จันทร์ดี',
                 st: accDone ? 'done' : c.status==='approved' ? 'now' : 'wait',
                 t:  accDone ? '24 พ.ค. 15:10' : 'รอ', c:'#2BD4B0'},
              {who:'ฝ่ายการเงิน (โอนเงิน)', s: c.paidBy || 'วรพรรณ รุ่งโรจน์',
                 st: finDone ? 'done' : c.status==='topay' ? 'now' : 'wait',
                 t:  finDone ? (c.paidAt + (c.paidRef? ' · '+c.paidRef : '')) : 'รอจ่าย', c:'#FF5C8A',
                 proof: c.paidProof },
            ];
          })().map((step, i, arr) => (
            <div key={i} style={{ display:'flex', gap:14, position:'relative' }}>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingTop:2 }}>
                <div style={{
                  width:24, height:24, borderRadius:'50%',
                  background: step.st==='done' ? 'var(--good)' : step.st==='now' ? 'var(--sun)' : 'var(--line-2)',
                  color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700
                }}>
                  {step.st==='done' ? '✓' : i+1}
                </div>
                {i<arr.length-1 && <div style={{ width:2, flex:1, background:'var(--line)', minHeight:30 }}/>}
              </div>
              <div style={{ paddingBottom:18, flex:1 }}>
                <div style={{ fontSize:12, color:'var(--ink-3)', fontWeight:600 }}>{step.who}</div>
                <div style={{ fontSize:14, fontWeight:600 }}>{firstName(step.s)}</div>
                <div style={{ fontSize:12, color:'var(--ink-3)' }}>{step.t}</div>
                {step.proof && (
                  <span className="badge" style={{ marginTop:4, background:'var(--mint-50)', color:'#0A7E64' }}>📎 แนบหลักฐาน</span>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>ไฟล์แนบ ({c.attach})</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {Array.from({length: c.attach || 1}).map((_,i) => (
            <div key={i} style={{
              aspectRatio:'4/3', borderRadius:12, background:'linear-gradient(135deg, #F1ECDF, #E9E2D0)',
              border:'1px dashed var(--line-2)', display:'flex', alignItems:'center', justifyContent:'center',
              color:'var(--ink-3)', fontSize:12, fontFamily:'IBM Plex Mono'
            }}>
              receipt-{i+1}.jpg
            </div>
          ))}
        </div>
      </div>

      {c.status==='pending' && role !== 'accountant' && (
        <div style={{ display:'flex', gap:10, position:'sticky', bottom:0, background:'white', paddingTop:12, borderTop:'1px solid var(--line)' }}>
          <button className="btn btn-soft" style={{ flex:1, color:'var(--bad)', justifyContent:'center' }}>ปฏิเสธ</button>
          <button className="btn btn-accent" style={{ flex:2, justifyContent:'center' }}><Icons.check size={16}/> อนุมัติ</button>
        </div>
      )}

      {canDirectPay && (
        <div style={{ display:'flex', gap:10, position:'sticky', bottom:0, background:'white', paddingTop:12, borderTop:'1px solid var(--line)' }}>
          <button className="btn btn-soft" style={{ flex:1, color:'var(--bad)', justifyContent:'center' }}>ปฏิเสธ</button>
          <button className="btn" onClick={()=>onAction && onAction('directPay', c)} style={{ flex:2.5, background:'var(--mint)', color:'var(--ink)', justifyContent:'center' }}>
            <Icons.send size={16}/> อนุมัติและจ่ายจากบัญชีบริษัท
          </button>
        </div>
      )}
    </div>
  </div>
  );
};

const ProjectPicker = ({ value, onChange }) => {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const active = PROJECTS.filter(p => p.active);
  const filtered = search ? active.filter(p => (p.code + p.label).toLowerCase().includes(search.toLowerCase())) : active;
  const current = PROJECTS.find(p => p.code === value);

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={()=>setOpen(!open)} style={{
        width:'100%', height:40, padding:'0 14px', borderRadius:12,
        border:'1px solid var(--line-2)', background:'white', cursor:'pointer',
        display:'flex', alignItems:'center', gap:10, fontFamily:'inherit', textAlign:'left'
      }}>
        <Icons.briefcase size={16} style={{ color:'var(--ink-3)' }}/>
        {current ? (
          <div style={{ flex:1, display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
            <span className="mono" style={{ fontWeight:700, fontSize:14 }}>{current.code}</span>
            {current.tag && <span className="badge" style={{ background:'var(--surface-2)', color:'var(--ink-2)', height:20, fontSize:10 }}>ทั่วไป</span>}
            <span style={{ fontSize:12, color:'var(--ink-3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {current.label !== current.code && current.label}
            </span>
          </div>
        ) : <span style={{ color:'var(--ink-3)', flex:1 }}>เลือกโครงการ…</span>}
        <Icons.arrowDown size={14} style={{ color:'var(--ink-3)', transform: open?'rotate(180deg)':'none', transition:'transform .15s' }}/>
      </button>

      {open && (
        <div className="fade-up" style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, right:0, zIndex:50,
          background:'white', borderRadius:14, border:'1px solid var(--line)',
          boxShadow:'var(--shadow-lg)', overflow:'hidden', maxHeight:340, display:'flex', flexDirection:'column'

const MultiProjectPicker = ({ value, onChange }) => {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const active = PROJECTS.filter(p => p.active && p.code !== 'ALL');
  const filtered = search ? active.filter(p => (p.code + p.label).toLowerCase().includes(search.toLowerCase())) : active;
  const toggle = (code) => {
    if (value.includes(code)) onChange(value.filter(c => c !== code));
    else onChange([...value, code]);
  };

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={()=>setOpen(!open)} style={{
        width:'100%', minHeight:40, padding:'6px 10px', borderRadius:12,

              }}>
                {code}

                      style={{ display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', opacity:.7, fontSize:14, lineHeight:1, fontWeight:700 }}>

          <div style={{ overflowY:'auto', flex:1, padding:'6px' }}>
