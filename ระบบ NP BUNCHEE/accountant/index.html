const ExpenseForm = ({ go, role='staff', staffDept='marketing', me, presetGroup }) => {
  const allowedGroups = (typeof getAllowedGroups === 'function') ? getAllowedGroups(role, staffDept) : ['A','B'];
  const allowedSections = (typeof getAllowedSections === 'function') ? getAllowedSections(role, staffDept) : ['1','2','3','4','5'];
  const allowedItems = (typeof getAllowedItems === 'function') ? getAllowedItems(role, staffDept) : null;

  // Pick safe default category from allowed sections/items
  const defaultCat = (() => {
    // ถ้ามี presetGroup (เช่นมาจากปุ่มลัด) → ใช้กลุ่มนั้นเป็นค่าเริ่มต้น
    const preferGroups = presetGroup && allowedGroups.includes(presetGroup) ? [presetGroup] : allowedGroups;
    for (const g of EXPENSE_GROUPS) {
      if (!preferGroups.includes(g.code)) continue;
      for (const s of g.sections) {
        if (!allowedSections.includes(s.code)) continue;
        const items = allowedItems ? s.items.filter(i => allowedItems.includes(i.code)) : s.items;
        if (items.length) return { cat: items[0].code, grp: g.code };
      }
    }
    return { cat: '1.1', grp: 'A' };
  })();

  const [category, setCategory] = React.useState(defaultCat.cat);
  const [groupCode, setGroupCode] = React.useState(defaultCat.grp);
  const [amount, setAmount] = React.useState('1240');
  const [desc, setDesc] = React.useState('ค่าแท็กซี่ไปประชุมลูกค้าที่อาคารเอ็มไพร์');
  const [date, setDate] = React.useState(nowDateTimeTH());
  const [budgetMonth, setBudgetMonth] = React.useState(CURRENT_BUDGET_MONTH);
  const [project, setProject] = React.useState('ADN');
  const [multiProjects, setMultiProjects] = React.useState(['ADN']);
  const [accountId, setAccountId] = React.useState(SAVED_ACCOUNTS[0].id);
  const [newOpen, setNewOpen] = React.useState(false);
  const [savedAccounts, setSavedAccounts] = React.useState(SAVED_ACCOUNTS);
  const [payMethod, setPayMethod] = React.useState('unknown');
  const [payAccountId, setPayAccountId] = React.useState('cb-1');
  const [confirmedBy, setConfirmedBy] = React.useState('');
  // โอนเงิน (หมวด transfer/transfer_cash) — บันทึก 2 ขา
  const [fromAcct, setFromAcct] = React.useState('');
  const [toAcct, setToAcct] = React.useState('');
  // โอนมัดจำ — ข้อมูลผู้รับมัดจำบุคคลภายนอก
  const [depBank, setDepBank] = React.useState('');
  const [depAcno, setDepAcno] = React.useState('');
  const [depName, setDepName] = React.useState('');
  const [toast, setToast] = React.useState(false);

  // ===== ตรรกะตามประเภทหมวด (acctType) =====
  const catMeta = (typeof CATEGORY_INDEX !== 'undefined') ? CATEGORY_INDEX[category] : null;
  const acctType = catMeta?.acctType || 'expense';
  const isContra = acctType === 'contra_revenue';
  // กลุ่ม B = หมวดโอน/ปรับปรุง (5.x) ทั้งหมด — ใช้บัญชีต้นทาง→ปลายทาง, ไม่มีวิธีชำระเงิน/บัญชีผู้รับ
  const isDepositTransfer = acctType === 'deposit_transfer';
  const isGroupB = acctType === 'transfer' || acctType === 'transfer_cash' || acctType === 'contra_revenue' || isDepositTransfer;

  // ทุกบทบาทเบิกค่าใช้จ่ายกลุ่ม A ได้ → เลือกได้หลายโครงการ ยอดที่กรอกหารเท่ากันตามจำนวนโครงการ
  const allowMultiProject = !isGroupB;
  const numProjects = allowMultiProject ? Math.max(multiProjects.length, 0) : 1;
  const perProjectAmount = numProjects > 0 ? (+amount || 0) / numProjects : 0;

  // ตัวเลือกบัญชี — ธนาคาร · ชื่อบัญชี · เลขบัญชี
  const acctLabelOf = (b) => { const bk = (typeof BANKS!=='undefined') ? BANKS.find(x=>x.code===b.bank) : null; return (bk?.name ? bk.name + ' · ' : '') + b.label + (b.acno && b.acno.indexOf('—')<0 ? ' · ' + b.acno : ''); };
  const acctByType = (t) => COMPANY_BANKS.filter(b=>b.active && b.acctType===t).map(b => ({ id:b.id, label:acctLabelOf(b) }));
  const CASH_OPT = { id:'cash', label:'เงินสดย่อย' };
  const DEP_OPT = { id:'depacc', label:'บันทึก ลงบัญชีมัดจำ' };
  const COMPANY_OPTS = COMPANY_BANKS.filter(b=>b.active && b.acctType!=='deposit').map(b => ({ id:b.id, label:acctLabelOf(b) }));
  const ALL_OPTS = [...COMPANY_OPTS, CASH_OPT];
  const acctTypeOf = (id) => id==='cash' ? 'cash' : (COMPANY_BANKS.find(b=>b.id===id)?.acctType);

  // กฎ ต้นทาง→ปลายทาง ต่อหมวด (ชื่อหมวดกำหนดทิศทางอยู่แล้ว)
  const transferRule = (code, from) => {
    const ft = acctTypeOf(from);
    switch (code) {
      case '5.1': return { from: [...acctByType('main'), CASH_OPT], to: acctByType('marketing') };
      case '5.2': return { from: acctByType('main'), to: acctByType('main') };
      case '5.3': return { from: [...acctByType('main'), CASH_OPT], to: acctByType('foreign') };
      case '5.4': return { from: [CASH_OPT], to: acctByType('cashier') };
      case '5.5': return { from: [CASH_OPT], to: acctByType('main') };
      case '5.6': {
        const fromOpts = [...acctByType('main'), ...acctByType('cashier')];
        const toOpts = ft==='main' ? acctByType('cashier') : ft==='cashier' ? acctByType('main') : fromOpts;
        return { from: fromOpts, to: toOpts };
      }
      case '5.7': {
        const fromOpts = [...COMPANY_OPTS, CASH_OPT, DEP_OPT];
        const toOpts = ft==='deposit' ? [...COMPANY_OPTS, CASH_OPT] : [DEP_OPT];
        return { from: fromOpts, to: toOpts };
      }
      default: return { from: ALL_OPTS, to: ALL_OPTS };
    }
  };
  const rule = isGroupB ? transferRule(category, fromAcct) : { from: [], to: [] };
  // ถ้าปลายทางที่เลือกไว้ไม่อยู่ในตัวเลือกที่ถูกต้องแล้ว ให้รีเซ็ต (เช่นเปลี่ยนต้นทางใน 5.6)
  React.useEffect(() => {
    if (isGroupB && toAcct && !rule.to.some(o => o.id === toAcct)) setToAcct('');
    if (isGroupB && fromAcct && !rule.from.some(o => o.id === fromAcct)) setFromAcct('');
    // ถ้าต้นทางมีตัวเลือกเดียว (ล็อกไว้ เช่น 5.4, 5.5) ให้เลือกให้อัตโนมัติ ผู้ใช้กดเลือกเองไม่ได้เพราะ select ถูก disable
    if (isGroupB && !fromAcct && rule.from.length === 1) setFromAcct(rule.from[0].id);
  }, [category, fromAcct]);

  const transferOk = !isGroupB || (fromAcct && toAcct && fromAcct !== toAcct);
  // หมวด B ที่แตะเงินสดย่อย → ต้องผ่านรอจ่ายเงิน · ที่เหลือ (โอนภายในล้วน) อนุมัติแล้วจบ
  const involvesCash = isGroupB && (fromAcct === 'cash' || toAcct === 'cash');
  const needsPayQueue = !isGroupB || involvesCash; // หมวด A เข้าคิวจ่ายปกติ
  // โอนมัดจำ: ฝั่งที่เป็นบัญชีมัดจำต้องกรอกข้อมูลผู้รับภายนอก (เฉพาะตอนวางมัดจำ = ปลายทางเป็นมัดจำ)
  const depToDeposit = isDepositTransfer && toAcct === 'depacc';
  const depOk = !depToDeposit || (depBank && depAcno && depName);
  const contraOk = !isContra || (project && project !== 'ALL');
  const multiProjectOk = !allowMultiProject || multiProjects.length > 0;
  const canSubmit = transferOk && contraOk && depOk && multiProjectOk;

  // สร้างเลขที่ใบเบิกใหม่ ต่อจากเลขสูงสุดที่มีอยู่ใน CLAIMS
  const genClaimId = (offset) => {
    const nums = CLAIMS.map(c => parseInt((c.id.match(/(\d+)$/) || [])[1] || '0', 10));
    const maxNum = nums.length ? Math.max(...nums) : 0;
    return `EXP-2569-${String(maxNum + 1 + offset).padStart(4, '0')}`;
  };

  // สร้างใบเบิกจริงเข้า CLAIMS ตอนกดส่ง — ถ้าเลือกหลายโครงการ จะแยกเป็น 1 ใบ/โครงการ
  // และหารยอดที่กรอกเท่ากันทุกใบ (ปัดเศษสตางค์ไว้ใบสุดท้ายให้ยอดรวมตรงเป๊ะกับยอดที่กรอก)
  const buildNewClaims = () => {
    const projectList = (allowMultiProject ? multiProjects : [project]).filter(Boolean);
    const n = projectList.length || 1;
    const total = +amount || 0;
    const base = Math.floor((total / n) * 100) / 100;
    const deptLabel = (me?.dept || '').replace(/^ฝ่าย/, '') || (ROLES[role]?.label || '');
    return projectList.map((code, idx) => ({
      id: genClaimId(idx),
      budgetMonth,
      date,
      who: me?.name || '—',
      whoShort: me?.short || '—',
      dept: deptLabel,
      category,
      desc,
      amount: idx === n - 1 ? Math.round((total - base * (n - 1)) * 100) / 100 : base,
      status: 'pending',
      attach: 0,
      projectCode: code,
      payMethod,
      ...(payMethod === 'transfer' ? { companyBankId: payAccountId } : {}),
      payeeAccountId: accountId,
      verified: false,
    }));
  };


  const cats = Object.keys(CATEGORY_COLOR);
  const visibleGroups = EXPENSE_GROUPS.filter(g => allowedGroups.includes(g.code));
  const currentGroup = visibleGroups.find(g => g.code === groupCode) || visibleGroups[0];
  const visibleSections = currentGroup ? currentGroup.sections.filter(s => allowedSections.includes(s.code)) : [];
  const restricted = role === 'staff';

  // Update groupCode if current group no longer available
  React.useEffect(() => {
    if (!allowedGroups.includes(groupCode)) setGroupCode(allowedGroups[0] || 'A');
  }, [role, staffDept]);

  return (
    <div data-screen-label="03 Expense Form">
      <PageHeader
        title="ยื่นเบิกค่าใช้จ่าย"
        sub="กรอกรายละเอียดและแนบใบเสร็จเพื่อส่งให้ผู้จัดการอนุมัติ"
        crumbs={['หน้าหลัก','รายจ่าย','สร้างใหม่']}
        actions={<>
          <button className="btn btn-soft" onClick={()=>go && go('documents')}>ยกเลิก</button>
          <button className="btn btn-soft">บันทึกร่าง</button>
          <button className="btn btn-accent" disabled={!canSubmit}
            title={!canSubmit ? (isGroupB && !transferOk ? 'กรุณาเลือกบัญชีต้นทาง/ปลายทาง' : (!multiProjectOk ? 'กรุณาเลือกอย่างน้อย 1 โครงการ' : 'กรุณาระบุโครงการที่นำส่งเกิน')) : ''}
            style={{ opacity: canSubmit?1:0.5, cursor: canSubmit?'pointer':'not-allowed' }}
            onClick={()=>{
              if(!canSubmit) return;
              const newClaims = buildNewClaims();
              CLAIMS.unshift(...newClaims);
              setToast(true);
              setTimeout(()=>{ setToast(false); go && go('documents'); }, 1400);
            }}>
            <Icons.send size={16}/> {allowMultiProject && multiProjects.length > 1 ? `ส่งขออนุมัติ (${multiProjects.length} รายการ)` : (isGroupB && !needsPayQueue ? 'ส่งขออนุมัติ (อนุมัติแล้วจบ)' : 'ส่งขออนุมัติ')}
          </button>
        </>}
      />

      <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:24 }}>
        {/* Left form */}
        <div className="card" style={{ padding:28 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <div style={{ fontSize:12, fontWeight:600, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.06em' }}>
              หมวดเบิกเงิน
            </div>
            <div style={{ fontSize:11, color:'var(--ink-3)' }}>
              จัดการหมวดได้โดย Admin เท่านั้น
            </div>
          </div>

          {/* Group A / B tabs */}
          {visibleGroups.length > 1 ? (
            <div style={{ display:'flex', gap:8, marginBottom:14, padding:4, background:'var(--surface-2)', borderRadius:12 }}>
              {visibleGroups.map(g => {
                const sel = groupCode === g.code;
                return (
                  <button key={g.code} onClick={()=>{
                    setGroupCode(g.code);
                    // ตั้งหมวด default ตามกลุ่ม: A → รายการแรกที่เบิกได้ (เช่น 1.1), B → 5.1
                    const firstSec = g.sections.find(s => allowedSections.includes(s.code));
                    const firstItem = firstSec && (allowedItems ? firstSec.items.find(i => allowedItems.includes(i.code)) : firstSec.items[0]);
                    if (firstItem) setCategory(firstItem.code);
                  }} style={{
                    flex:1, padding:'10px 14px', borderRadius:10, border:'none', cursor:'pointer', fontFamily:'inherit',
                    background: sel ? 'white' : 'transparent',
                    color: sel ? 'var(--ink)' : 'var(--ink-2)',
                    fontSize:13, fontWeight:600, textAlign:'left',
                    boxShadow: sel ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
                    display:'flex', alignItems:'center', gap:10
                  }}>
                    <span style={{
                      width:24, height:24, borderRadius:7, background:g.color, color:'white',
                      display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif',
                      fontSize:12, fontWeight:700, flex:'0 0 24px'
                    }}>{g.code}</span>
                    <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{g.label}</span>
                  </button>
                );
              })}
            </div>
          ) : null}

          {restricted && (
            <div style={{
              padding:'10px 14px', background:'var(--surface-2)', borderRadius:10, marginBottom:14,
              display:'flex', alignItems:'center', gap:10, fontSize:12, color:'var(--ink-2)'
            }}>
              <Icons.shield size={14} style={{ color: STAFF_DEPTS[staffDept]?.color }}/>
              <span>
                คุณสังกัด <b style={{ color: STAFF_DEPTS[staffDept]?.color }}>{STAFF_DEPTS[staffDept]?.label}</b>
                {' '}— เบิกได้เฉพาะหมวด <b className="mono">{allowedSections.join(', ')}</b>
              </span>
            </div>
          )}

          {/* Sub-items grouped by section */}
          <div style={{ display:'flex', flexDirection:'column', gap:14, marginBottom:24, maxHeight:300, overflowY:'auto', padding:'4px 2px' }}>
            {visibleSections.length === 0 ? (
              <div style={{ padding:'30px 14px', textAlign:'center', color:'var(--ink-3)', background:'var(--surface-2)', borderRadius:10, fontSize:13 }}>
                ไม่มีหมวดในกลุ่มนี้ที่คุณสามารถเบิกได้
              </div>
            ) : visibleSections.map(s => (
              <div key={s.code}>
                <div style={{ fontSize:11, fontWeight:700, color:s.color, textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ width:14, height:14, borderRadius:4, background:s.color, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, fontFamily:'Sora, sans-serif' }}>{s.code}</span>
                  {s.label}
                </div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                  {(allowedItems ? s.items.filter(i => allowedItems.includes(i.code)) : s.items).map(it => {
                    const sel = category === it.code;
                    return (
                      <button key={it.code} onClick={()=>setCategory(it.code)} style={{
                        padding:'7px 12px', borderRadius:999, cursor:'pointer', fontFamily:'inherit',
                        border: sel ? `2px solid ${s.color}` : '1px solid var(--line-2)',
                        background: sel ? s.color+'18' : 'white',
                        color: sel ? s.color : 'var(--ink-2)',
                        fontWeight: sel?700:500, fontSize:12,
                        display:'inline-flex', alignItems:'center', gap:6
                      }}>
                        <span className="mono" style={{ opacity:.7, fontSize:11 }}>{it.code}</span>
                        <span>{it.label.replace(/^Admin\s/, '').replace(/^การตลาด\s/, '').replace(/^management\s/, '')}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:16 }}>
            <div>
              <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>วันที่เบิก</label>
              <div style={{ position:'relative' }}>
                <input className="input mono" value={date} readOnly disabled style={{ paddingLeft:38, background:'var(--surface-2)', color:'var(--ink-2)', cursor:'not-allowed' }}/>
                <Icons.clock size={16} style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--ink-3)' }}/>
              </div>
              <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:4 }}>บันทึกอัตโนมัติจากระบบ · แก้ไขไม่ได้</div>
            </div>
            <div>
              <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>เดือนงบประมาณ</label>
              <select className="input" value={budgetMonth} onChange={e=>setBudgetMonth(e.target.value)} style={{ fontSize:14 }}>
                {budgetMonthOptions(4).map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
              </select>
              <div style={{ fontSize:11, color:'var(--ink-3)', marginTop:4 }}>ใช้สรุปยอดในรายงานประจำเดือน</div>
            </div>
            <div>
              <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>
                โครงการ{isContra && <span style={{ color:'var(--bad)' }}> *</span>}
                {allowMultiProject && <span style={{ fontWeight:500, color:'var(--ink-3)' }}> (เลือกได้หลายโครงการ)</span>}
              </label>
              {allowMultiProject ? (
                <>
                  <MultiProjectPicker value={multiProjects} onChange={setMultiProjects}/>
                  {multiProjects.length > 1 && (
                    <div style={{ fontSize:11, color:'var(--primary)', marginTop:4, fontWeight:600 }}>
                      ยอดที่กรอกจะถูกหารเท่ากัน {multiProjects.length} โครงการ · โครงการละ {fmtTHB(perProjectAmount)}
                    </div>
                  )}
                  {multiProjects.length === 0 && (
                    <div style={{ fontSize:11, color:'var(--bad)', marginTop:4, fontWeight:600 }}>⚠ กรุณาเลือกอย่างน้อย 1 โครงการ</div>
                  )}
                </>
              ) : (
                <ProjectPicker value={project} onChange={setProject}/>
              )}
            </div>
          </div>

          {/* ===== บล็อกตามประเภทหมวด ===== */}
          {isGroupB && (
            <div className="fade-up" style={{ marginBottom:16, padding:'16px 18px', background:'#EAF4FF', borderRadius:14, border:'1px solid #BFDEFF' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                <Icons.refresh size={16} style={{ color:'#2A6FDB' }}/>
                <span style={{ fontSize:13, fontWeight:700, color:'#1E4E9A' }}>รายการโอนเงิน — บันทึก 2 ขา (double-entry)</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:12, alignItems:'end' }}>
                <div>
                  <label style={{ fontSize:12, fontWeight:600, display:'block', marginBottom:5, color:'#1E4E9A' }}>บัญชีต้นทาง (โอนออก) *</label>
                  <select className="input" value={fromAcct} onChange={e=>setFromAcct(e.target.value)} disabled={rule.from.length===1} style={{ background: rule.from.length===1 ? 'var(--surface-2)' : 'white' }}>
                    <option value="">— เลือก —</option>
                    {rule.from.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                  </select>
                </div>
                <div style={{ paddingBottom:10, color:'#2A6FDB' }}><Icons.arrowRight size={18}/></div>
                <div>
                  <label style={{ fontSize:12, fontWeight:600, display:'block', marginBottom:5, color:'#1E4E9A' }}>บัญชีปลายทาง (โอนเข้า) *</label>
                  <select className="input" value={toAcct} onChange={e=>setToAcct(e.target.value)} disabled={!fromAcct && category==='5.6'} style={{ background:'white' }}>
                    <option value="">— เลือก —</option>
                    {rule.to.filter(o => o.id !== fromAcct).map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                  </select>
                </div>
              </div>
              {fromAcct && toAcct && fromAcct === toAcct && (
                <div style={{ marginTop:8, fontSize:12, color:'var(--bad)', fontWeight:600 }}>⚠ บัญชีต้นทางและปลายทางต้องไม่ซ้ำกัน</div>
              )}
              <div style={{ marginTop:10, fontSize:11.5, color:'#3A6098', display:'flex', alignItems:'flex-start', gap:6 }}>
                <Icons.check size={12} style={{ marginTop:2, flex:'0 0 12px' }}/>
                <span>{catMeta?.label} · ระบบบันทึกขาออก+ขาเข้าด้วยเลขอ้างอิงเดียว — กระทบยอดสิ้นเดือน 0 อัตโนมัติ · โอนกลับได้</span>
              </div>

              {/* ป้ายบอกเส้นทาง: แตะเงินสด → รอจ่าย / โอนภายใน → อนุมัติแล้วจบ */}
              {fromAcct && toAcct && (
                <div style={{ marginTop:10, padding:'10px 12px', borderRadius:9, display:'flex', alignItems:'center', gap:8, fontSize:12, fontWeight:600,
                  background: involvesCash ? '#FFF4E0' : '#EAF7EF',
                  color: involvesCash ? '#9C5C2A' : '#0A7E64' }}>
                  {involvesCash
                    ? <><Icons.wallet size={14}/> เกี่ยวข้องกับเงินสดย่อย → ต้องผ่าน "รออนุมัติ → รอจ่ายเงิน"</>
                    : <><Icons.check size={14}/> โอนภายในบัญชีบริษัท → เมื่ออนุมัติแล้วบันทึกทันที (ไม่ต้องรอจ่าย)</>}
                </div>
              )}

              {/* โอนมัดจำ — ข้อมูลผู้รับบุคคลภายนอก (เมื่อปลายทาง=บัญชีมัดจำ) */}
              {isDepositTransfer && (fromAcct==='depacc' || toAcct==='depacc') && (
                <div style={{ marginTop:14, padding:'14px 16px', background:'#FBF1E6', borderRadius:12, border:'1px solid #EAD2B4' }}>
                  <div style={{ fontSize:12.5, fontWeight:700, color:'#9C5C2A', marginBottom:10, display:'flex', alignItems:'center', gap:7 }}>
                    <Icons.deposit size={15}/>
                    {depToDeposit ? 'ข้อมูลผู้รับมัดจำ (บุคคลภายนอก)' : 'อ้างอิงผู้วางมัดจำเดิม (รับคืน)'}
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1.2fr', gap:10, marginBottom:10 }}>
                    <div>
                      <label style={{ fontSize:11.5, fontWeight:600, display:'block', marginBottom:4, color:'#9C5C2A' }}>ธนาคาร{depToDeposit && ' *'}</label>

const Row = ({ k, v }) => (

// ========== APPROVAL QUEUE ==========

const Approval = ({ role }) => {
  const [tab, setTab] = React.useState('pending');
  const [selected, setSelected] = React.useState(new Set());
  const [toast, setToast] = React.useState('');
  // Per-row pay account choice (id of COMPANY_BANK or 'cash') — default ตามวิธีชำระเงินที่ผู้ขอระบุ
  const [payAccounts, setPayAccounts] = React.useState(() => {
    const m = {};
    CLAIMS.forEach(c => {
      if (c.payMethod === 'cash') m[c.id] = 'cash';
      else if (c.companyBankId) m[c.id] = c.companyBankId;
      else m[c.id] = 'cb-1'; // unknown — ให้บัญชีพิจารณา
    });
    return m;
  });
  const setPayAcc = (id, v) => setPayAccounts({ ...payAccounts, [id]: v });
  // Per-row confirmedBy (editable by accountant/manager)
  const [confirmedByMap, setConfirmedByMap] = React.useState(() => {
    const m = {};
    CLAIMS.forEach(c => { if (c.confirmedBy) m[c.id] = c.confirmedBy; });
    return m;
  });
  const setConfirmedByForRow = (id, v) => setConfirmedByMap({ ...confirmedByMap, [id]: v });
  // Per-row amount (ผู้จัดการแก้ไขได้)
  const [amounts, setAmounts] = React.useState(() => {
    const m = {}; CLAIMS.forEach(c => { m[c.id] = c.amount; }); return m;
  });
  const setAmt = (id, v) => setAmounts({ ...amounts, [id]: v });
  const [editingAmt, setEditingAmt] = React.useState(null);
  const canEditAmount = role === 'manager';
  // Reject dialog (พนักงานบัญชี/ผู้จัดการ)
  const [rejectFor, setRejectFor] = React.useState(null);
  const [rejectReason, setRejectReason] = React.useState('');
  // Permission check
  const FOREIGN_BANK_IDS = ['cb-3']; // บัญชีต่างประเทศ USD
  const canApprove = (accId) => {
    if (role === 'manager') return true;
    if (role === 'accountant') {
      if (accId === 'cash') return false;
      if (FOREIGN_BANK_IDS.includes(accId)) return false;
      return true;
    }
    return false;
  };

  const tabs = [
    {k:'pending', l:'รอคุณอนุมัติ', n: CLAIMS.filter(c=>c.status==='pending').length, c:'var(--sun)'},
    {k:'approved', l:'อนุมัติแล้ว', n: CLAIMS.filter(c=>c.status==='approved').length, c:'var(--good)'},
    {k:'rejected', l:'ถูกปฏิเสธ', n: CLAIMS.filter(c=>c.status==='rejected').length, c:'var(--bad)'},
  ];
  const rows = CLAIMS.filter(c => c.status === tab);

  const toggle = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };
  const toggleAll = () => {
    if (selected.size === rows.length) setSelected(new Set());
    else setSelected(new Set(rows.map(r=>r.id)));
  };

  const selectedTotal = rows.filter(r => selected.has(r.id)).reduce((s,c)=>s+c.amount,0);

  return (
    <div data-screen-label="04 Approval Queue">
      <PageHeader
        title="คิวอนุมัติ"
        sub="รายการรอการอนุมัติของคุณ — กดเลือกหลายรายการเพื่ออนุมัติพร้อมกันได้"
        crumbs={['หน้าหลัก','รออนุมัติ']}
        actions={<>

<script type="text/babel" data-presets="react,env">
// Reports, Journal/GL, User management, Profile, Payroll

// ============ REPORTS ============

// deterministic pseudo-random 0..1 from a string + salt
const seededUnit = (str, salt) => {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  h = Math.imul(h ^ (salt * 2654435761), 2246822519);
  return ((h >>> 0) % 100000) / 100000;
};

// Per-project P&L generator. M = period multiplier (month=1, ytd=5, year=12)
const projectFinancials = (code, M) => {
  const rev = Math.round((280000 + seededUnit(code, 1) * 1100000) * M);
  const cats = {
    '1': Math.round((38000 + seededUnit(code, 2) * 150000) * M),
    '2': Math.round((4000  + seededUnit(code, 3) * 22000)  * M),
    '3': Math.round((26000 + seededUnit(code, 4) * 110000) * M),
    '4': Math.round((18000 + seededUnit(code, 5) * 80000)  * M),
  };
  const cost = cats['1'] + cats['2'] + cats['3'] + cats['4'];
  return { rev, cats, cost, net: rev - cost };
};

const CAT_META = [
  { code:'1', label:'การตลาด',       color:'#FF8C6B' },
  { code:'2', label:'ระบบ',          color:'#2BD4B0' },
  { code:'3', label:'Admin',         color:'#5BB8FF' },
  { code:'4', label:'บริหารส่วนกลาง', color:'#FFCB47' },
];

const ProjectReports = ({ period, M, monthLabel }) => {
  const projects = PROJECTS.filter(p => p.active && !p.tag);
  const [selected, setSelected] = React.useState(projects[0]?.code || 'ADN');
  const periodTxt = period === 'month' ? ('รายเดือน ' + monthLabel) : period === 'ytd' ? 'สะสม YTD ม.ค.–พ.ค. 2569' : 'รายปี 2569';

  const rowsData = projects.map(p => ({ p, ...projectFinancials(p.code, M) }))
    .sort((a,b) => b.rev - a.rev);

  // #ALL — งบส่วนกลางแยกตามหมวด แล้วหารเฉลี่ยเท่ากันทุกโครงการที่มีรายรับ → บวกกลับเข้าหมวดเดิม
  const sharedByCat = { '1': Math.round(64000*M), '2': Math.round(40000*M), '3': Math.round(38000*M), '4': Math.round(26000*M) };
  const revProjects = rowsData.filter(r => r.rev > 0);
  const nRev = revProjects.length || 1;
  const allocByCat = {};
  CAT_META.forEach(c => { allocByCat[c.code] = Math.round(sharedByCat[c.code] / nRev); });
  const allocPerProject = CAT_META.reduce((s,c)=>s+allocByCat[c.code], 0);
  rowsData.forEach(r => {
    r.catsAll = {};
    CAT_META.forEach(c => { r.catsAll[c.code] = r.cats[c.code] + (r.rev>0 ? allocByCat[c.code] : 0); });
    r.alloc = r.rev>0 ? allocPerProject : 0;     // รวมเฉลี่ย #ALL ที่บวกเข้าแล้ว
    r.costAll = r.cost + r.alloc;
    r.netAll = r.rev - r.costAll;
  });

  const totals = rowsData.reduce((acc, r) => {
    acc.rev += r.rev; acc.cost += r.cost; acc.alloc += r.alloc; acc.costAll += r.costAll; acc.net += r.netAll;
    CAT_META.forEach(c => { acc.cats[c.code] = (acc.cats[c.code]||0) + r.catsAll[c.code]; });
    return acc;
  }, { rev:0, cost:0, alloc:0, costAll:0, net:0, cats:{} });

  const selRow = rowsData.find(r => r.p.code === selected) || rowsData[0];
  const sel = projectFinancials(selected, M);
  const selAlloc = selRow ? selRow.alloc : 0;
  const selProj = projects.find(p => p.code === selected);

  return (
    <>
      {/* Headline KPI */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16, marginBottom:24 }}>
        <StatCard label="จำนวนโครงการ" value={projects.length.toString()} sub={periodTxt} icon="briefcase" accent="var(--primary)" big/>
        <StatCard label="รายรับรวมทุกโครงการ" value={fmtTHB(totals.rev, {compact:true})} sub={periodTxt} icon="arrowDown" accent="var(--mint)" big/>
        <StatCard label="รายจ่ายรวมทุกโครงการ" value={fmtTHB(totals.costAll, {compact:true})} sub={"หมวด 1–4 (รวมเฉลี่ย #ALL " + fmtTHB(totals.alloc, {compact:true}) + ")"} icon="arrowUp" accent="var(--peach)" big/>
        <StatCard label="กำไรสุทธิรวม" value={fmtTHB(totals.net, {compact:true})} sub={'Margin ' + (totals.rev>0?(totals.net/totals.rev*100).toFixed(1):'0') + '%'} icon="trending" accent="var(--sun)" big/>
      </div>

      {/* Matrix table: project × category */}
      <div className="card" style={{ padding:0, marginBottom:20, overflow:'hidden' }}>
        <div style={{ padding:'18px 22px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', gap:12 }}>
          <div>
            <div className="display" style={{ fontSize:16, fontWeight:700 }}>รายรับ–รายจ่ายแยกรายโครงการ</div>
            <div style={{ fontSize:12, color:'var(--ink-3)' }}>{periodTxt} · เรียงตามรายรับ · หมวด 1–4 <b style={{ color:'#7A5AF0' }}>รวมส่วนเฉลี่ย #ALL</b> แล้ว (งบส่วนกลางแต่ละหมวด ÷ {revProjects.length} โครงการที่มีรายรับ)</div>
          </div>
          <div style={{ flex:1 }}/>
          <button className="btn btn-soft" style={{ height:32 }}><Icons.download size={14}/> Excel</button>
        </div>
        <div style={{ overflowX:'auto' }}>
          <table className="tbl" style={{ minWidth:880 }}>
            <thead><tr>
              <th>โครงการ</th>
              <th style={{ textAlign:'right' }}>รายรับ</th>
              {CAT_META.map(c => (
                <th key={c.code} style={{ textAlign:'right' }}>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:5 }}>
                    <span style={{ width:8, height:8, borderRadius:2, background:c.color }}/>{c.code} {c.label}
                  </span>
                </th>
              ))}
              <th style={{ textAlign:'right' }}>รวมจ่าย</th>
              <th style={{ textAlign:'right' }}>สุทธิ</th>
            </tr></thead>
            <tbody>
              {rowsData.map(r => {
                const isSel = r.p.code === selected;
                return (
                  <tr key={r.p.code} onClick={()=>setSelected(r.p.code)} style={{ cursor:'pointer', background: isSel ? 'var(--primary-50)' : 'transparent' }}>
                    <td>
                      <span className="mono" style={{ fontWeight:700, color: isSel?'var(--primary)':'var(--ink)' }}>{r.p.code}</span>
                      {(period==='year' || period==='ytd') && r.p.start && (
                        <div style={{ fontSize:10.5, color:'var(--ink-3)', marginTop:2 }}>
                          {fmtThaiMonthYear(r.p.start)} · {projectAgeMonths(r.p.start)} เดือน
                        </div>
                      )}
                    </td>
                    <td className="mono" style={{ textAlign:'right', fontWeight:700, color:'#0A7E64' }}>{fmtTHB(r.rev)}</td>
                    {CAT_META.map(c => (
                      <td key={c.code} className="mono" style={{ textAlign:'right', color:'var(--ink-2)' }} title={'รวมเฉลี่ย #ALL ' + fmtTHB(r.rev>0?allocByCat[c.code]:0)}>{fmtTHB(r.catsAll[c.code])}</td>
                    ))}
                    <td className="mono" style={{ textAlign:'right', fontWeight:600, color:'#A8492A' }}>{fmtTHB(r.costAll)}</td>
                    <td className="mono" style={{ textAlign:'right', fontWeight:700, color: r.netAll>=0?'var(--good)':'var(--bad)' }}>{fmtTHB(r.netAll)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{ background:'var(--ink)', color:'white' }}>
                <td style={{ padding:'14px', fontWeight:700 }}>รวมทุกโครงการ</td>
                <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#7BF1CE' }}>{fmtTHB(totals.rev)}</td>
                {CAT_META.map(c => (
                  <td key={c.code} className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:600 }}>{fmtTHB(totals.cats[c.code])}</td>
                ))}
                <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#FFAFBE' }}>{fmtTHB(totals.costAll)}</td>
                <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700 }}>{fmtTHB(totals.net)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Selected project detail */}
      <div className="card" style={{ padding:24 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <div style={{ width:44, height:44, borderRadius:11, background:'var(--primary)', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif', fontWeight:800, fontSize:15 }}>{selProj?.code}</div>
          <div style={{ flex:1 }}>
            <div className="display" style={{ fontSize:18, fontWeight:700 }}>โครงการ {selProj?.code}</div>
            <div style={{ fontSize:12, color:'var(--ink-3)' }}>
              งบกำไรขาดทุนรายโครงการ · {periodTxt}
              {selProj?.start && <> · เริ่ม {fmtThaiMonthYear(selProj.start)} · อายุ {projectAgeMonths(selProj.start)} เดือน</>}
            </div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:11, color:'var(--ink-3)' }}>กำไรสุทธิ (หลังเฉลี่ย #ALL)</div>
            <div className="display mono" style={{ fontSize:24, fontWeight:700, color: (sel.rev - sel.cost - selAlloc)>=0?'var(--good)':'var(--bad)' }}>{fmtTHB(sel.rev - sel.cost - selAlloc)}</div>
          </div>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1.3fr', gap:24 }}>
          {/* Donut of cost by category */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14 }}>
            <Donut size={190} thickness={26} slices={CAT_META.map(c => ({ value: selRow.catsAll[c.code], color: c.color }))}
              center={<>
                <div className="display" style={{ fontSize:20, fontWeight:700 }}>{fmtTHB(selRow.costAll, {compact:true})}</div>
                <div style={{ fontSize:11, color:'var(--ink-3)' }}>รายจ่ายรวม</div>
              </>}/>
            <div style={{ display:'flex', justifyContent:'space-between', width:'100%', padding:'12px 16px', background:'var(--mint-50)', borderRadius:10 }}>
              <span style={{ fontWeight:700, fontSize:14 }}>รายรับ</span>
              <span className="display mono" style={{ fontSize:18, fontWeight:700, color:'#0A7E64' }}>{fmtTHB(sel.rev)}</span>
            </div>
          </div>

          {/* Category breakdown w/ sub-items */}
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {EXPENSE_GROUPS.flatMap(g => g.sections).filter(s => ['1','2','3','4'].includes(s.code)).map(s => {
              const amount = selRow.catsAll[s.code];
              const allocPart = selRow.p.rev>0 ? allocByCat[s.code] : 0;
              const pct = selRow.costAll > 0 ? (amount/selRow.costAll)*100 : 0;
              return (
                <details key={s.code} style={{ border:'1px solid var(--line)', borderRadius:10, overflow:'hidden' }}>
                  <summary style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', cursor:'pointer', listStyle:'none', background:'var(--surface-2)' }}>
                    <span style={{ width:24, height:24, borderRadius:6, background:s.color, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:11, flex:'0 0 24px' }}>{s.code}</span>
                    <span style={{ flex:1, fontSize:13, fontWeight:700 }}>{s.label}
                      {allocPart>0 && <span style={{ fontSize:10.5, color:'#7A5AF0', fontWeight:600, marginLeft:6 }}>(รวม #ALL {fmtTHB(allocPart, {compact:true})})</span>}
                    </span>
                    <span className="mono" style={{ fontSize:13, fontWeight:700, color:s.color }}>{fmtTHB(amount)}</span>
                    <span className="mono" style={{ fontSize:11, color:'var(--ink-3)', width:46, textAlign:'right' }}>{pct.toFixed(0)}%</span>
                  </summary>
                  <div style={{ padding:'8px 14px 12px' }}>
                    {s.items.map((it, i) => {
                      const base = selRow.catsAll[s.code] - allocPart;
                      const itemAmt = Math.round(base * (seededUnit(selected + it.code, 7) + 0.2) / s.items.reduce((sm, x, j) => sm + (seededUnit(selected + x.code, 7) + 0.2), 0));
                      return (
                        <div key={it.code} style={{ display:'flex', justifyContent:'space-between', fontSize:12, padding:'4px 0', borderBottom: i < s.items.length-1 ? '1px dashed var(--line)' : 'none' }}>
                          <span style={{ color:'var(--ink-2)' }}>
                            <span className="mono" style={{ color:'var(--ink-3)', marginRight:6 }}>{it.code}</span>
                            {it.label.replace(/^Admin\s/, '').replace(/^การตลาด\s/, '').replace(/^management\s/, '')}
                          </span>
                          <span className="mono" style={{ color:'var(--ink-2)' }}>{fmtTHB(itemAmt)}</span>
                        </div>
                      );
                    })}
                    {allocPart>0 && (
                      <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, padding:'4px 0', borderTop:'1px dashed var(--line)', color:'#7A5AF0', fontWeight:600 }}>
                        <span>+ เฉลี่ยงบส่วนกลาง #ALL</span>
                        <span className="mono">{fmtTHB(allocPart)}</span>
                      </div>
                    )}
                  </div>
                </details>
              );
            })}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'8px 14px', marginTop:4 }}>
              <span style={{ fontSize:13, color:'var(--ink-2)' }}>ต้นทุนเฉพาะโครงการ</span>
              <span className="mono" style={{ fontSize:13, fontWeight:600, color:'#A8492A' }}>{fmtTHB(sel.cost)}</span>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'8px 14px' }}>
              <span style={{ fontSize:13, color:'#7A5AF0', display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ width:7, height:7, borderRadius:99, background:'#7A5AF0' }}/> เฉลี่ยงบส่วนกลาง #ALL (กระจายเข้าหมวด)
              </span>
              <span className="mono" style={{ fontSize:13, fontWeight:600, color:'#7A5AF0' }}>{fmtTHB(selAlloc)}</span>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'12px 14px', background:'var(--peach-50)', borderRadius:10, marginTop:4 }}>
              <span style={{ fontWeight:700, fontSize:14 }}>รวมรายจ่าย (รวม #ALL)</span>
              <span className="display mono" style={{ fontSize:18, fontWeight:700, color:'#A8492A' }}>{fmtTHB(selRow.costAll)}</span>
            </div>
          </div>
        </div>
      </div>
    </>
  );
};

const Reports = ({ role }) => {
  const [period, setPeriod] = React.useState('month');
  const [view, setView] = React.useState('company'); // 'company' | 'project'
  const canEditInsights = role === 'executive' || role === 'manager';
  const [budgetMonth, setBudgetMonth] = React.useState(CURRENT_BUDGET_MONTH);
  const M = period === 'month' ? 1 : period === 'ytd' ? 5 : 12; // YTD = 5 เดือน, ปี = 12
  const monthLabel = budgetMonthOptions(4).find(o=>o.key===budgetMonth)?.label || 'พ.ค. 2569';
  const pShort = period==='month' ? 'พ.ค.' : period==='ytd' ? 'YTD' : 'ปี 2569';
  const pLong  = period==='month' ? ('รายเดือน ' + monthLabel) : period==='ytd' ? 'สะสม YTD ม.ค.–พ.ค. 2569' : 'รายปี 2569';

  // Revenue split into 2 buckets
  const revenue = {
    received: Math.round(2840600 * M),    // เข้าบัญชีบริษัทแล้ว
    cashier:  Math.round(485200 * M),     // ยังไม่เข้าระบบ - รอบันทึก
  };
  const totalRev = revenue.received + revenue.cashier;

  // Costs by section (จาก EXPENSE_GROUPS) — หมวด 5 ไม่นับเป็นต้นทุน (เป็นการโอนภายใน/เบิกจากเงินสด)
  const costsBySection = [
    { code:'1', label:'การตลาด',         color:'#FF8C6B', amount: 186420 * M, claims: 24 * M },
    { code:'2', label:'ระบบ',            color:'#2BD4B0', amount: 28400 * M,  claims: 6 * M  },
    { code:'3', label:'Admin',           color:'#5BB8FF', amount: 412100 * M, claims: 48 * M },
    { code:'4', label:'บริหารส่วนกลาง',   color:'#FFCB47', amount: 235800 * M, claims: 18 * M },
  ];
  const internalTransfer = { code:'5', label:'เบิกสำรอง / โอนภายใน', color:'#FF5C8A', amount: 92000 * M, claims: 8 * M };
  const contraRev = Math.round(18000 * M);  // หมวด 5.4 คืนรายรับนำส่งเกิน — หักจากรายได้
  const totalCost = costsBySection.reduce((s,c) => s + c.amount, 0);
  const netRevenue = totalRev - contraRev;        // รายได้สุทธิหลังหักคืนรายรับเกิน (5.4)
  const profit = netRevenue - totalCost;          // = กำไรขั้นต้น
  const margin = netRevenue > 0 ? (profit/netRevenue)*100 : 0;

  // ----- ข้อสังเกตอัตโนมัติ (คำนวณจากตัวเลขในระบบจริง) -----
  const biggestCost = [...costsBySection].sort((a,b) => b.amount - a.amount)[0];
  const biggestCostPct = totalCost > 0 ? (biggestCost.amount/totalCost)*100 : 0;
  const receivedPct = totalRev > 0 ? (revenue.received/totalRev)*100 : 0;
  const costRatio = totalRev > 0 ? (totalCost/totalRev)*100 : 0;
  const autoInsights = [
    { text: <>รายได้รับเข้าบัญชีแล้ว <b>{receivedPct.toFixed(0)}%</b> ของยอดรวม</>,
      tone: receivedPct >= 80 ? 'good' : 'warn' },
    { text: <>ยังมีเงินค้างที่แคชเชียร์ <b>{fmtTHB(revenue.cashier, {compact:true})}</b> รอนำส่งเข้าระบบ</>,
      tone: revenue.cashier > 0 ? 'warn' : 'good' },
    { text: <>กำไรขั้นต้น <b>{fmtTHB(profit, {compact:true})}</b> · Margin <b>{margin.toFixed(1)}%</b> (ต้นทุนคิดเป็น {costRatio.toFixed(0)}% ของรายได้)</>,
      tone: margin >= 0 ? 'good' : 'bad' },
    { text: <>หมวดต้นทุนที่สูงสุดคือ <b>{biggestCost.label}</b> (หมวด {biggestCost.code}) — {fmtTHB(biggestCost.amount, {compact:true})} · {biggestCostPct.toFixed(0)}% ของต้นทุนรวม</>,
      tone: 'neutral' },
  ];

  // ----- ข้อสังเกตที่แก้ไขเอง (ผู้บริหาร/ผู้จัดการ) -----
  const NOTES_KEY = 'bw_report_notes';
  const [manualNotes, setManualNotes] = React.useState(() => {
    try { const s = localStorage.getItem(NOTES_KEY); if (s) return JSON.parse(s); } catch(e){}
    return ['Margin เดือนนี้สูงกว่าเป้าที่ตั้งไว้ 24%'];
  });
  React.useEffect(() => { try { localStorage.setItem(NOTES_KEY, JSON.stringify(manualNotes)); } catch(e){} }, [manualNotes]);
  const [editingNotes, setEditingNotes] = React.useState(false);
  const [draftNote, setDraftNote] = React.useState('');

  return (
    <div data-screen-label="05 Reports">
      <PageHeader
        title="รายงานและงบการเงิน"
        sub="งบการเงินและรายงานเชิงวิเคราะห์ — ภาพรวมบริษัท / รายโครงการ · รายเดือน / YTD / รายปี"
        crumbs={['หน้าหลัก','รายงาน']}
        actions={<>
          <div style={{ display:'flex', gap:4, padding:4, background:'var(--surface-2)', borderRadius:10 }}>
            {[{k:'company', l:'ภาพรวมบริษัท'}, {k:'project', l:'รายโครงการ'}].map(v => {
              const sel = view === v.k;
              return (
                <button key={v.k} onClick={()=>setView(v.k)} style={{
                  padding:'8px 16px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                  background: sel ? 'var(--primary)' : 'transparent', color: sel ? 'white' : 'var(--ink-2)',
                  fontSize:13, fontWeight:600
                }}>{v.l}</button>
              );
            })}
          </div>
          <div style={{ display:'flex', gap:4, padding:4, background:'var(--surface-2)', borderRadius:10 }}>
            {[{k:'month', l:'รายเดือน'}, {k:'ytd', l:'YTD'}, {k:'year', l:'รายปี'}].map(p => {
              const sel = period === p.k;
              return (
                <button key={p.k} onClick={()=>setPeriod(p.k)} style={{
                  padding:'8px 16px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                  background: sel ? 'white' : 'transparent', color: sel ? 'var(--ink)' : 'var(--ink-2)',
                  fontSize:13, fontWeight:600, boxShadow: sel ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
                }}>{p.l}</button>
              );
            })}
          </div>
          {period === 'month' && (
            <select className="input" value={budgetMonth} onChange={e=>setBudgetMonth(e.target.value)} style={{ width:160, height:38, fontSize:13 }}>
              {budgetMonthOptions(4).map(o => <option key={o.key} value={o.key}>เดือนงบ: {o.label}</option>)}
            </select>
          )}
          <button className="btn btn-soft"><Icons.download size={16}/> ดาวน์โหลด PDF</button>
        </>}
      />

      {view === 'project' && <ProjectReports period={period} M={M} monthLabel={monthLabel}/>}
      {view === 'company' && (<>
      {/* Headline KPI: revenue (2 buckets) + cost + profit */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16, marginBottom:24 }}>
        <StatCard label="รายได้รับแล้ว" value={fmtTHB(revenue.received, {compact:true})}
                  sub={"เข้าบัญชีบริษัทแล้ว · " + pShort}
                  delta={8.4} icon="arrowDown" accent="var(--mint)" big/>
        <StatCard label="รับที่แคชเชียร์" value={fmtTHB(revenue.cashier, {compact:true})}
                  sub="ยังไม่เข้าระบบ · รอบันทึก"
                  icon="wallet" accent="var(--sun)" big/>
        <StatCard label="ต้นทุนรวม" value={fmtTHB(totalCost, {compact:true})}
                  sub={costsBySection.length + ' หมวด · ' + pShort}
                  delta={-2.1} icon="arrowUp" accent="var(--peach)" big/>
        <StatCard label="กำไรขั้นต้น" value={fmtTHB(profit, {compact:true})}
                  sub={'Margin ' + margin.toFixed(1) + '%'}
                  delta={9.2} icon="trending" accent="var(--primary)" big/>
      </div>

      {/* Revenue detail */}
      <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:20, marginBottom:20 }}>
        <div className="card" style={{ padding:24 }}>
          <SectionHead title="รายได้ — แยกตามช่องทางรับเงิน"
                       sub={pLong}/>
          <RevenueRow label="รายได้รับแล้ว" sub="โอนเข้าบัญชีบริษัท · รอบันทึกแล้ว" amount={revenue.received} total={totalRev} color="var(--mint)" icon="arrowDown"/>
          <RevenueRow label="รับที่แคชเชียร์" sub="รับเงินสด / โอนส่วนตัว · รอส่งเข้าระบบ" amount={revenue.cashier} total={totalRev} color="var(--sun)" icon="wallet"/>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'14px',
                        background:'var(--mint-50)', borderRadius:12, marginTop:6 }}>
            <div style={{ fontWeight:700, fontSize:15 }}>รวมรายได้</div>
            <div className="display mono" style={{ fontSize:22, fontWeight:700, color:'#0A7E64' }}>{fmtTHB(totalRev)}</div>
          </div>
        </div>

        <div className="card" style={{ padding:24, background:'linear-gradient(140deg, var(--primary-50), var(--mint-50))', border:'none' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
            <Icons.sparkle size={22} style={{ color:'var(--primary)' }}/>
            <div className="display" style={{ fontSize:16, fontWeight:700, flex:1 }}>ข้อสังเกตสำคัญ</div>
            {canEditInsights && (
              <button onClick={()=>setEditingNotes(v=>!v)} className="btn btn-soft" style={{ height:30, fontSize:12 }}>
                <Icons.edit size={13}/> {editingNotes ? 'เสร็จสิ้น' : 'แก้ไขบันทึก'}
              </button>
            )}
          </div>

          {/* คำนวณอัตโนมัติจากตัวเลขในระบบ */}
          <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom: (manualNotes.length || editingNotes) ? 14 : 0 }}>
            {autoInsights.map((ins, i) => {
              const dot = ins.tone==='good' ? 'var(--good)' : ins.tone==='warn' ? '#E8A317' : ins.tone==='bad' ? 'var(--bad)' : 'var(--primary)';
              return (
                <div key={i} style={{ display:'flex', gap:9, fontSize:13, lineHeight:1.55, color:'var(--ink-2)' }}>
                  <span style={{ width:7, height:7, borderRadius:99, background:dot, flex:'0 0 7px', marginTop:6 }}/>
                  <span style={{ flex:1 }}>{ins.text}</span>
                </div>
              );
            })}
          </div>

          {/* บันทึกที่แก้ไขเอง (ผู้บริหาร/ผู้จัดการ) */}
          {(manualNotes.length > 0 || editingNotes) && (
            <div style={{ borderTop:'1px dashed rgba(0,0,0,.12)', paddingTop:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:8, display:'flex', alignItems:'center', gap:6 }}>
                <Icons.edit size={12}/> บันทึกเพิ่มเติมโดยผู้บริหาร
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {manualNotes.map((note, i) => (
                  <div key={i} style={{ display:'flex', gap:9, fontSize:13, lineHeight:1.55, color:'var(--ink)', alignItems:'flex-start' }}>
                    <span style={{ width:7, height:7, borderRadius:99, background:'var(--ink-3)', flex:'0 0 7px', marginTop:6 }}/>
                    {editingNotes ? (
                      <>
                        <input value={note} onChange={e=>setManualNotes(manualNotes.map((n,j)=>j===i?e.target.value:n))}
                          style={{ flex:1, height:30, padding:'0 8px', borderRadius:6, border:'1px solid var(--line)', background:'white', fontSize:13, fontFamily:'inherit' }}/>
                        <button onClick={()=>setManualNotes(manualNotes.filter((_,j)=>j!==i))}
                          style={{ width:30, height:30, borderRadius:6, border:'none', background:'var(--rose-50)', color:'var(--bad)', cursor:'pointer', flex:'0 0 30px' }}>
                          <Icons.trash size={14}/>
                        </button>
                      </>
                    ) : <span style={{ flex:1 }}>{note}</span>}
                  </div>
                ))}
              </div>
              {editingNotes && (
                <div style={{ display:'flex', gap:8, marginTop:10 }}>
                  <input value={draftNote} onChange={e=>setDraftNote(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter' && draftNote.trim()){ setManualNotes([...manualNotes, draftNote.trim()]); setDraftNote(''); } }}
                    placeholder="พิมพ์ข้อสังเกตใหม่ แล้วกด Enter…"
                    style={{ flex:1, height:34, padding:'0 10px', borderRadius:7, border:'1px solid var(--line)', background:'white', fontSize:13, fontFamily:'inherit' }}/>
                  <button className="btn btn-accent" style={{ height:34 }} disabled={!draftNote.trim()}
                    onClick={()=>{ if(draftNote.trim()){ setManualNotes([...manualNotes, draftNote.trim()]); setDraftNote(''); } }}>
                    <Icons.plus size={14}/> เพิ่ม
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Cost by category */}
      <div className="card" style={{ padding:24, marginBottom:20 }}>
        <SectionHead title="ต้นทุนแยกตามหมวด"
                     sub={pLong + ' · หมวด 1–5'}
                     right={<button className="btn btn-soft" style={{ height:32 }}><Icons.download size={14}/> Excel</button>}/>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1.4fr', gap:24 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Donut size={200} thickness={28} slices={costsBySection.map(c => ({ value: c.amount, color: c.color }))}
              center={<>
                <div className="display" style={{ fontSize:22, fontWeight:700 }}>{fmtTHB(totalCost, {compact:true})}</div>
                <div style={{ fontSize:11, color:'var(--ink-3)' }}>ต้นทุนรวม</div>
              </>}/>
          </div>

          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
            <div className="display" style={{ fontSize:15, fontWeight:700 }}>หมวดต้นทุน (4 หมวด)</div>
            <span style={{ fontSize:11, color:'var(--ink-3)' }}>หมวด 5 ไม่นับ—ดูด้านล่าง</span>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {costsBySection.map(c => {
              const pct = (c.amount/totalCost)*100;
              return (
                <div key={c.code}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
                    <span style={{
                      width:28, height:28, borderRadius:7, background:c.color, color:'white',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:12, flex:'0 0 28px'
                    }}>{c.code}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:600 }}>{c.label}</div>
                      <div style={{ fontSize:11, color:'var(--ink-3)' }}>{c.claims} รายการ</div>
                    </div>
                    <div className="mono" style={{ fontSize:14, fontWeight:700 }}>{fmtTHB(c.amount)}</div>
                    <div className="mono" style={{ fontSize:12, color:'var(--ink-3)', width:48, textAlign:'right' }}>{pct.toFixed(1)}%</div>
                  </div>
                  <div style={{ height:6, background:'var(--surface-2)', borderRadius:999, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${pct}%`, background:c.color, borderRadius:999 }}/>
                  </div>
                </div>
              );
            })}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'12px 14px',
                          background:'var(--peach-50)', borderRadius:10, marginTop:6 }}>
              <div style={{ fontWeight:700, fontSize:14 }}>รวมต้นทุน</div>
              <div className="display mono" style={{ fontSize:18, fontWeight:700, color:'#A8492A' }}>{fmtTHB(totalCost)}</div>
            </div>
          </div>
        </div>

        {/* Section 5 — internal transfer (not a cost) */}
        <div style={{ marginTop:20, padding:16, background:'linear-gradient(135deg, var(--rose-50), #FFE6DD)', borderRadius:14, border:'1px dashed #F5B4C5' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:36, height:36, borderRadius:9, background:internalTransfer.color, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:13 }}>{internalTransfer.code}</div>

  const fxState = fxAdjust[current.id] || { addTHB:0, rows:[] };
  const fcBalance = current.fcBalance || 0;
  const bookTHB = (current.balance || 0) + fxState.addTHB;
  const avgRate = fcBalance > 0 ? bookTHB / fcBalance : 0;
  const lastRate = current.lastRate || avgRate; // อัตราที่ใช้ครั้งก่อน
  const reserveLow = isForeignView && fcBalance < reserveMin;
  const [fxRevalOpen, setFxRevalOpen] = React.useState(false);

  const applyReval = (newRate) => {
    const marketTHB = newRate * fcBalance;
    const diff = Math.round(marketTHB - bookTHB); // +กำไร / -ขาดทุน
    const today = new Date(); const ds = today.getDate() + '/' + String(today.getMonth()+1).padStart(2,'0');
    // รายการปรับปรุงในบัญชี USDT (ปรับมูลค่าบาทให้ตรงราคาตลาด)
    const adjRow = { d:ds, v:'FX-REVAL', n:`ตีราคาตามอัตรา ${newRate.toFixed(2)} (เดิม ${avgRate.toFixed(2)})`, dr: diff>0?diff:null, cr: diff<0?-diff:null, bal: marketTHB, ref:'ALL', fc:0, rate:newRate, fxAdj:true, latest:true };
    setFxAdjust({ ...fxAdjust, [current.id]: { addTHB: fxState.addTHB + diff, rows:[...fxState.rows, adjRow] } });
    setFxRevalOpen(false);
  };

  // ผนวกรายการปรับปรุง FX เข้าตาราง + ใช้ยอดบาทล่าสุด
  if (isForeignView) {
    rows = [...rows, ...fxState.rows];
    currentBalance = bookTHB;
  }

  // Totals
  const totalDebit = rows.reduce((s,r) => s + (r.dr || 0), 0);
  const totalCredit = rows.reduce((s,r) => s + (r.cr || 0), 0);

  return (
    <div data-screen-label="06 Journal / GL">
      <PageHeader
        title="ความเคลื่อนไหวบัญชี"
        sub="General Ledger — บัญชีบริษัท และเงินสดย่อย"
        crumbs={['หน้าหลัก','บัญชีแยกประเภท']}
        actions={<>
          {isDepositView ? (
            <div style={{ display:'flex', alignItems:'center', gap:7, padding:'8px 14px', background:'#FBF1E6', borderRadius:10, border:'1px solid #EAD2B4' }}>
              <Icons.deposit size={15} style={{ color:'#9C5C2A' }}/>
              <span style={{ fontSize:12.5, fontWeight:700, color:'#9C5C2A' }}>แสดงทั้งหมดตั้งแต่เริ่มต้น</span>
            </div>
          ) : (
          <div style={{ display:'flex', gap:4, padding:4, background:'var(--surface-2)', borderRadius:10 }}>
            {[{k:'prev', l:'เดือนก่อน'},{k:'month', l:'เดือนนี้'},{k:'custom', l:'ช่วงวันที่'}].map(p => {
              const sel = range === p.k;
              return (
                <button key={p.k} onClick={()=>setRange(p.k)} style={{
                  padding:'7px 14px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                  background: sel ? 'white' : 'transparent', color: sel ? 'var(--ink)' : 'var(--ink-2)',
                  fontSize:13, fontWeight:600, boxShadow: sel ? '0 1px 3px rgba(0,0,0,.08)' : 'none'
                }}>{p.l}</button>
              );
            })}
          </div>
          )}
          {!isDepositView && range === 'custom' && (
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <input type="date" className="input mono" value={fromDate} onChange={e=>setFromDate(e.target.value)} style={{ width:150, height:38, fontSize:12 }}/>
              <span style={{ color:'var(--ink-3)' }}>–</span>
              <input type="date" className="input mono" value={toDate} onChange={e=>setToDate(e.target.value)} style={{ width:150, height:38, fontSize:12 }}/>
            </div>
          )}
          <button className="btn btn-soft"><Icons.download size={16}/> ส่งออก</button>
        </>}
      />

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16, marginBottom:20 }}>
        <StatCard label="บัญชีบริษัทที่ใช้งาน" value={banks.filter(b=>b.active).length.toString()} sub={banks.length + ' บัญชีทั้งหมด'} icon="wallet" accent="var(--primary)"/>
        <StatCard label="เงินรวมทุกบัญชี" value={fmtTHB(banks.filter(b=>b.active).reduce((s,b)=>s+b.balance,0), {compact:true})} sub="ณ ขณะนี้" icon="trending" accent="var(--good)"/>
        <StatCard label="เงินเข้าเดือนนี้" value={fmtTHB(totalDebit, {compact:true})} sub={(isGroup?'กลุ่ม ':'บัญชี ') + displayName} icon="arrowDown" accent="var(--mint)"/>
        <StatCard label="เงินออกเดือนนี้" value={fmtTHB(totalCredit, {compact:true})} sub={(isGroup?'กลุ่ม ':'บัญชี ') + displayName} icon="arrowUp" accent="var(--peach)"/>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 2.4fr', gap:20 }}>
        {/* Company Banks list (left) */}
        <div className="card" style={{ padding:0, alignSelf:'start' }}>
          <div style={{ padding:'18px 20px 12px' }}>
            <div className="display" style={{ fontSize:15, fontWeight:700 }}>บัญชีทั้งหมด</div>
            <div style={{ fontSize:12, color:'var(--ink-3)' }}>บัญชีบริษัท + เงินสดย่อย</div>
          </div>
          <div style={{ borderTop:'1px solid var(--line)' }}>
            {(() => {
              const GROUP_ORDER = ['main','marketing','cashier','foreign','deposit','petty'];
              const GROUP_LABELS = { main:'บัญชีหลัก', marketing:'บัญชีการตลาด', cashier:'บัญชีพัก Cashier', foreign:'บัญชีต่างประเทศ (USDT)', deposit:'บัญชีมัดจำ', petty:'เงินสดย่อย' };
              const groupOf = (b) => b.id === 'cash' ? 'petty' : (b.acctType || 'main');
              return GROUP_ORDER.map(g => {
                const items = banks.filter(b => groupOf(b) === g);
                if (items.length === 0) return null;
                const groupColor = g === 'petty' ? '#FFCB47' : (ACCT_TYPES[g]?.color || 'var(--ink-3)');
                const groupTotal = items.reduce((s,b)=>s+b.balance,0);
                const gSel = selectedBank === 'group:'+g;
                return (
                  <div key={g}>
                    <div style={{
                      width:'100%', padding:'10px 14px 10px 16px', display:'flex', alignItems:'center', gap:8,
                      background: gSel ? 'var(--ink)' : 'var(--surface-2)',
                      borderLeft: gSel ? '3px solid var(--ink)' : '3px solid transparent',
                      borderBottom:'1px solid var(--line)'
                    }}>
                      <button onClick={()=>toggleGroup(g)} title={expandedGroups[g]?'ยุบ':'ขยาย'} style={{
                        width:20, height:20, border:'none', background:'transparent', cursor:'pointer', padding:0,
                        display:'flex', alignItems:'center', justifyContent:'center', flex:'0 0 20px',
                        color: gSel?'white':'var(--ink-3)', transform: expandedGroups[g]?'rotate(90deg)':'none', transition:'transform .15s'
                      }}>
                        <Icons.chevronRight size={15}/>
                      </button>
                      <span style={{ width:8, height:8, borderRadius:3, background:groupColor, flex:'0 0 8px' }}/>
                      <button onClick={()=>toggleGroup(g)} style={{
                        flex:1, border:'none', background:'transparent', cursor:'pointer', padding:0, textAlign:'left',
                        fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', color: gSel?'white':'var(--ink-2)'
                      }}>{GROUP_LABELS[g]} <span style={{ opacity:.6, fontWeight:600 }}>· {items.length}</span></button>
                      <button onClick={()=>setSelectedBank('group:'+g)} title="ดูยอดรวมทั้งกลุ่ม" className="mono" style={{
                        border:'none', background:'transparent', cursor:'pointer', padding:'2px 4px', borderRadius:5,
                        fontSize:11, fontWeight:700, color: gSel?'rgba(255,255,255,.95)':'var(--ink-3)',
                        textDecoration:'underline', textUnderlineOffset:2
                      }}>{fmtTHB(groupTotal, {compact:true})}</button>
                    </div>
                    {expandedGroups[g] && items.map(b => {
                      const bk = b.id === 'cash' ? { short:'฿', color:'#FFCB47' } : BANKS.find(x => x.code === b.bank);
                      const sel = selectedBank === b.id;
                      return (
                        <button key={b.id} onClick={()=>setSelectedBank(b.id)} style={{
                          width:'100%', padding:'14px 20px', display:'flex', alignItems:'center', gap:12,
                          background: sel ? 'var(--primary-50)' : 'transparent',
                          borderLeft: sel ? '3px solid var(--primary)' : '3px solid transparent',
                          border:'none', borderBottom:'1px solid var(--line)', cursor:'pointer', fontFamily:'inherit',
                          textAlign:'left', opacity: b.active ? 1 : 0.55
                        }}>
                          <div style={{
                            width:38, height:38, borderRadius:9, background:bk?.color, color:'white',
                            display:'flex', alignItems:'center', justifyContent:'center',
                            fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:12, flex:'0 0 38px'
                          }}>{bk?.short}</div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                              <span style={{ fontSize:13, fontWeight:700, color: sel?'var(--primary)':'var(--ink)' }}>{b.id==='cash' ? b.label : (b.holder || b.name || b.label)}</span>
                              {b.isDefault && <span className="badge" style={{ background:'var(--primary)', color:'white', height:16, fontSize:10, padding:'0 6px' }}>หลัก</span>}
                            </div>
                            <div className="mono" style={{ fontSize:11, color:'var(--ink-3)' }}>{b.id==='cash' ? 'เงินสดในมือ' : (bk?.short + ' ' + b.acno)}</div>
                          </div>
                          <div className="mono" style={{ fontSize:13, fontWeight:700, color:'var(--ink)', textAlign:'right' }}>
                            {fmtTHB(b.balance, {compact:true})}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                );
              });
            })()}
            <div style={{ padding:14, background:'var(--surface-2)', borderTop:'1px solid var(--line)', textAlign:'center', fontSize:12, color:'var(--ink-3)' }}>
              <Icons.shield size={12} style={{ verticalAlign:'middle', marginRight:4 }}/>
              จัดการบัญชีได้ที่ "บัญชีบริษัท" (ผู้จัดการ)
            </div>
          </div>
        </div>

        {/* Movements (right) */}
        <div>
          <div className="card" style={{ padding:0, marginBottom:16 }}>
            <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', gap:12 }}>
              <div style={{
                width:48, height:48, borderRadius:12, background:bankInfo?.color, color:'white',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'Sora, sans-serif', fontWeight:700, fontSize:14
              }}>{bankInfo?.short}</div>
              <div>
                <div className="display" style={{ fontSize:17, fontWeight:700 }}>{isGroup ? bankInfo?.name : (bankInfo?.name + ' — ' + (current.id==='cash' ? current.label : (current.holder || current.name || current.label)))}</div>
                <div className="mono" style={{ fontSize:12, color:'var(--ink-3)' }}>{isGroup ? ('รวม ' + groupAccounts.length + ' บัญชีในกลุ่ม') : current.acno}</div>
              </div>
              <div style={{ flex:1 }}/>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:11, color:'var(--ink-3)' }}>{isGroup ? 'ยอดคงเหลือรวมทุกบัญชี' : isForeignView ? 'ยอดคงเหลือ (สำรอง)' : 'ยอดคงเหลือ'}</div>
                {isForeignView ? (
                  <>
                    <div className="display mono" style={{ fontSize:24, fontWeight:700, color:'#16A34A' }}>{fcBalance.toLocaleString()} {fcCode}</div>
                    <div className="mono" style={{ fontSize:13, color:'var(--ink-3)' }}>≈ {fmtTHB(currentBalance)} <span style={{ fontSize:11 }}>(ต้นทุน ø {avgRate.toFixed(2)})</span></div>
                  </>
                ) : (
                  <div className="display mono" style={{ fontSize:24, fontWeight:700, color: currentBalance>0?'var(--good)':'var(--ink)' }}>{fmtTHB(currentBalance)}</div>
                )}
              </div>
            </div>

            {/* Foreign reserve panel */}
            {isForeignView && (
              <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--line)', background: reserveLow?'var(--rose-50)':'#F0FAF4', display:'flex', alignItems:'center', gap:16, flexWrap:'wrap' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Icons.wallet size={16} style={{ color: reserveLow?'var(--bad)':'#16A34A' }}/>
                  <div>
                    <div style={{ fontSize:11, color:'var(--ink-3)' }}>เงินสำรองขั้นต่ำ</div>
                    <div className="mono" style={{ fontSize:13, fontWeight:700, color: reserveLow?'var(--bad)':'var(--ink)' }}>{reserveMin.toLocaleString()} {fcCode}</div>
                  </div>
                </div>
                <div style={{ height:32, width:1, background:'var(--line)' }}/>
                <div style={{ flex:1, fontSize:12.5, fontWeight:600, color: reserveLow?'var(--bad)':'#0A7E64' }}>
                  {reserveLow
                    ? `⚠ สำรองต่ำกว่าเกณฑ์ ${(reserveMin-fcBalance).toLocaleString()} ${fcCode} — ควรเติมสำรอง`
                    : `✓ สำรองเพียงพอ (เหลือเหนือเกณฑ์ ${(fcBalance-reserveMin).toLocaleString()} ${fcCode})`}
                </div>
                {(role==='manager' || role==='accountant') && (
                  <div style={{ display:'flex', gap:8 }}>
                    <button className="btn btn-soft" style={{ height:34 }} onClick={()=>go && go('expense', { presetGroup:'B' })}><Icons.send size={14}/> เบิก/โอน (หมวด B)</button>
                    <button className="btn btn-accent" style={{ height:34 }} onClick={()=>setFxRevalOpen(true)}><Icons.refresh size={14}/> อัพเดทค่าเงิน</button>
                  </div>
                )}
              </div>
            )}
            {isForeignView && (
              <div style={{ padding:'8px 20px', borderBottom:'1px solid var(--line)', background:'#FBFAF7', fontSize:11.5, color:'var(--ink-3)', display:'flex', alignItems:'center', gap:6 }}>
                <Icons.refresh size={12}/> เติมสำรอง {fcCode}: ทำผ่าน "เบิกค่าใช้จ่าย → กลุ่ม B → โอนบาทจากบัญชีหลัก" (กรอกอัตราตอนโอน) · ปุ่มนี้ใช้อัพเดทอัตราปัจจุบันเท่านั้น
              </div>
            )}

            <table className="tbl">
              <thead><tr>
                <th>วันที่</th><th>เลขที่</th><th>คำอธิบาย</th>
                <th>โครงการ</th>
                {isGroup && <th>บัญชี</th>}
                {isForeignView && <th style={{ textAlign:'right' }}>{fcCode} (อัตรา)</th>}
                <th style={{ textAlign:'right' }}>เงินเข้า</th>
                <th style={{ textAlign:'right' }}>เงินออก</th>
                {!isGroup && <th style={{ textAlign:'right' }}>คงเหลือ</th>}
              </tr></thead>
              <tbody>
                {rows.map((r,i) => (
                  <tr key={i} style={{ background: r.opening?'var(--surface-2)': r.latest?'var(--primary-50)':'transparent' }}>
                    <td className="mono" style={{ color:'var(--ink-3)' }}>{r.d}</td>
                    <td className="mono" style={{ color:'var(--primary)', fontWeight:600 }}>{r.v}</td>
                    <td style={{ color:'var(--ink-2)', fontStyle: r.opening?'italic':'normal' }}>{r.n}</td>
                    <td>{r.ref ? <ProjectCell code={r.ref}/> : <span style={{ color:'var(--ink-3)' }}>—</span>}</td>
                    {isGroup && <td style={{ fontSize:12, color:'var(--ink-2)', fontWeight:600 }}>{r._acc}</td>}
                    {isForeignView && (
                      <td className="mono" style={{ textAlign:'right' }}>
                        {r.fc ? (
                          <>
                            <span style={{ fontWeight:700, color: r.fc>0?'#16A34A':'var(--bad)' }}>{r.fc>0?'+':''}{r.fc.toLocaleString()}</span>
                            {r.rate && <div style={{ fontSize:10.5, color:'var(--ink-3)' }}>@ {r.rate.toFixed(2)}</div>}
                          </>
                        ) : <span style={{ color:'var(--ink-3)' }}>—</span>}
                      </td>
                    )}
                    <td className="mono" style={{ textAlign:'right', color: r.dr?'var(--good)':'var(--ink-3)', fontWeight: r.dr?700:400 }}>
                      {r.dr ? fmtTHB(r.dr) : '—'}
                    </td>
                    <td className="mono" style={{ textAlign:'right', color: r.cr?'var(--bad)':'var(--ink-3)', fontWeight: r.cr?700:400 }}>
                      {r.cr ? fmtTHB(r.cr) : '—'}
                    </td>
                    {!isGroup && <td className="mono" style={{ textAlign:'right', fontWeight:700 }}>{fmtTHB(r.bal)}</td>}
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{ background:'var(--ink)', color:'white' }}>
                  <td colSpan={isGroup ? 5 : (isForeignView ? 5 : 4)} style={{ padding:'14px', fontSize:13, fontWeight:700 }}>
                    รวม {isDepositView?'ทั้งหมดตั้งแต่เริ่มต้น':range==='prev'?'เดือนก่อน':range==='custom'?'ช่วงที่เลือก':'เดือนนี้'} — {rows.filter(r => !r.opening).length} รายการ
                    {isForeignView && <span style={{ marginLeft:10, color:'#7BF1CE' }}>· คงเหลือ {fcBalance.toLocaleString()} {fcCode}</span>}
                  </td>
                  <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#7BF1CE' }}>{fmtTHB(totalDebit)}</td>
                  <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700, color:'#FFAFBE' }}>{fmtTHB(totalCredit)}</td>
                  {!isGroup && <td className="mono" style={{ textAlign:'right', padding:'14px', fontWeight:700 }}>{fmtTHB(currentBalance)}</td>}
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>

      {fxRevalOpen && <FxRevalDialog fcCode={fcCode} fcBalance={fcBalance} bookTHB={bookTHB} avgRate={avgRate} onConfirm={applyReval} onClose={()=>setFxRevalOpen(false)}/>}
    </div>
  );
};

// ===== Dialog: อัพเดทค่าเงิน (revaluation) → ยืนยันแล้วสร้างรายการปรับเข้าหมวด 4.5 อัตโนมัติ =====
// กำไรจากอัตราแลกเปลี่ยน = รายจ่ายติดลบ (ลดต้นทุน) · ขาดทุน = รายจ่ายบวก
const FxRevalDialog = ({ fcCode, fcBalance, bookTHB, avgRate, onConfirm, onClose }) => {
  const [closeRate, setCloseRate] = React.useState('');
  const [step, setStep] = React.useState(1); // 1=กรอกอัตรา, 2=ยืนยันสร้างรายการ, 3=สำเร็จ
  const cr = parseFloat(closeRate) || 0;
  const marketTHB = Math.round(cr * fcBalance);
  const diff = marketTHB - bookTHB;            // +ส่วนต่าง = มูลค่าเพิ่มขึ้น (กำไร)
  const expense45 = -diff;                      // กำไร→รายจ่ายติดลบ · ขาดทุน→รายจ่ายบวก
  const changed = cr > 0 && Math.abs(diff) >= 1;
  const valid = cr > 0;
  const refNo = 'FX-' + new Date().getFullYear().toString().slice(-2) + '69-' + String(Math.floor(Math.random()*900)+100);

  return (
    <div className="overlay" style={{ position:'fixed', inset:0, background:'rgba(20,16,40,.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:60, padding:20 }} onClick={onClose}>
      <div className="card fade-up" style={{ width:480, maxWidth:'100%', padding:0, overflow:'hidden' }} onClick={e=>e.stopPropagation()}>
        <div style={{ padding:'18px 24px', borderBottom:'1px solid var(--line)' }}>
          <div className="display" style={{ fontSize:16, fontWeight:700 }}>อัพเดทค่าเงิน — {fcCode}</div>
          <div style={{ fontSize:12, color:'var(--ink-3)', marginTop:2 }}>พิมพ์อัตราปัจจุบัน · ระบบปรับยอดอัตโนมัติ · ส่วนต่างสร้างรายการเข้าหมวด 4.5</div>
        </div>

        {step !== 3 ? (
          <div style={{ padding:'20px 24px' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:13 }}>
                <span style={{ color:'var(--ink-2)' }}>ยอดสำรองคงเหลือ</span>
                <span className="mono" style={{ fontWeight:700 }}>{fcBalance.toLocaleString()} {fcCode}</span>
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:13 }}>
                <span style={{ color:'var(--ink-2)' }}>มูลค่าตามบัญชีเดิม (ต้นทุน ø {avgRate.toFixed(2)})</span>
                <span className="mono" style={{ fontWeight:700 }}>{fmtTHB(bookTHB)}</span>
              </div>
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>อัตราปัจจุบัน (บาท/{fcCode}) *</label>
              <input className="input mono" type="number" value={closeRate} onChange={e=>setCloseRate(e.target.value)} placeholder={avgRate?avgRate.toFixed(2):'36.00'} style={{ fontWeight:700, fontSize:16 }} disabled={step===2}/>
            </div>
            {valid && (
              <div style={{ padding:'14px 16px', borderRadius:10, background: diff>=0?'#F0FAF4':'var(--rose-50)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6 }}>
                  <span style={{ color:'var(--ink-2)' }}>มูลค่าตามอัตราใหม่</span>
                  <span className="mono" style={{ fontWeight:700 }}>{fmtTHB(marketTHB)}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: changed?8:0 }}>

const Payment = ({ role }) => {

  const FOREIGN_BANK_IDS = ['cb-3'];
  const canPay = (c) => {
    if (role === 'manager') return true;
    if (role === 'accountant') {
      if (c.payMethod === 'cash') return false;
      if (FOREIGN_BANK_IDS.includes(c.companyBankId)) return false;
      return true;
    }
    if (role === 'finance') return c.payMethod === 'cash';
    return false;
  };
  const denyReason = (c) => {
    if (role === 'accountant') {
      if (c.payMethod === 'cash') return 'พนักงานบัญชีจ่ายเงินสดย่อยไม่ได้';
      if (FOREIGN_BANK_IDS.includes(c.companyBankId)) return 'พนักงานบัญชีจ่ายบัญชีต่างประเทศไม่ได้';

    return '';
  };

  const visibleForRole = (c) => role !== 'finance' || c.payMethod === 'cash';

        </>}
      />

        {tabs.map(t => (

            padding:'18px 22px', textAlign:'left', cursor:'pointer', background: tab===t.k?'var(--ink)':'white',
            color: tab===t.k?'white':'inherit', border: tab===t.k?'1px solid var(--ink)':'1px solid var(--line)',

            </div>
          </button>

          <button className="btn" onClick={()=>{ const ids=[...selected]; setPayOpen({batch:true, ids}); }}

          </button>
        </div>
      )}

      <div className="card" style={{ padding:0, overflow:'hidden' }}>
        <table className="tbl">
          <thead><tr>
            {tab==='topay' && <th style={{ width:32 }}><input type="checkbox" checked={selected.size === rows.length && rows.length>0} onChange={toggleAll}/></th>}

          <tbody>
            {rows.map(c => (
              <tr key={c.id}>

                </td>
                <td>
                  {(() => {
                    if (c.payMethod === 'cash') {
                      return (
                        <div>

                          <div style={{ fontSize:11, color:'#9C5C2A', marginTop:4, display:'flex', alignItems:'center', gap:4 }}>
                            <Icons.check size={10}/> ยืนยันโดย <b>{c.confirmedBy || '—'}</b>
                          </div>
                        </div>
                      );
                    }
                    const cb = COMPANY_BANKS.find(b => b.id === c.companyBankId);

                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>

                      <button className="btn btn-soft" style={{ height:32, padding:'0 12px', whiteSpace:'nowrap', flex:'0 0 auto' }}>

          </tbody>

        {rows.length === 0 && <Empty title="ไม่มีรายการในหมวดนี้" sub="ลองสลับแท็บอื่น" icon="check"/>}
      </div>

      {payOpen && <PayDialog item={payOpen} onClose={()=>setPayOpen(null)} onPaid={(msg)=>{

    </div>
  );
